          h('button',{onClick:()=>setStars(1),style:{fontSize:13,color:"#f97316",background:"none",border:"none",cursor:"pointer",textDecoration:"underline",fontWeight:600}},"Solicitar reapertura de la solicitud")))));
}

// ── APP ROOT ───────────────────────────────────────────────────────────────
function App() {
  // Detect URL params immediately so seguimiento works without login
  const _params = new URLSearchParams(window.location.search);
  const _segParam  = _params.get("seguimiento");
  const _calParam  = _params.get("calificar");
  const _compParam  = _params.get("completar");
  const _valParam   = _params.get("validar");
  const _rechValParam = _params.get("rechazar_validacion");
  const _verParam   = _params.get("ver");
  const _initView  = _segParam  ? "seguimiento_"+_segParam
    : _valParam   ? "validar_detalle_"+_valParam
    : _rechValParam ? "rechazar_val_"+_rechValParam
    : _compParam  ? "completar_"+_compParam
    : _calParam   ? "calificar_"+_calParam
    : _verParam   ? "ver_"+_verParam
    : _params.get("confirmar") ? "loading"
    : _params.get("rechazar")  ? "loading"
    : _params.get("reabrir")   ? "loading"
    : "socio";

  const [view,setView]           = useState(_initView);
  const [recs,setRecs]           = useState([]);
  const [ejecutores,setEjecutores] = useState([]);
  const [loaded,setLoaded]       = useState(false);
  const [authInt, setAuthInt]    = useState(()=>sessionStorage.getItem('authInt')==='1');
  const [authAdm, setAuthAdm]    = useState(()=>sessionStorage.getItem('authAdm')==='1');

  useEffect(()=>{
    (async()=>{
      const params = new URLSearchParams(window.location.search);
      const confirmarId  = params.get("confirmar");
      const rechazarId   = params.get("rechazar");
      const reabrirId    = params.get("reabrir");
      const seguimientoN = params.get("seguimiento");
      const calificarId  = params.get("calificar");
      const completarId  = params.get("completar");
      const validarId    = params.get("validar");
      const calendarId   = params.get("calendar");
      const calendarMail = params.get("mail");
      const rechazarValId = params.get("rechazar_validacion");

      const lista = await sbGetAll();

      if(confirmarId){
        const r=lista.find(r=>String(r.id)===confirmarId);
        if(r){
          // Update individual executor in lista + global flag
          const mailParam = params.get("mail") || r.ejecutorMail;
          const ejListaUpdated = (r.ejecutores_lista||[]).length > 0
            ? (r.ejecutores_lista||[]).map(ej=>
                ej.mail===mailParam ? {...ej,confirmado:true,rechazado:false,fechaConfirmacion:new Date().toISOString()} : ej)
            : [{mail:mailParam,nombre:r.ejecutorNombre,confirmado:true,fechaConfirmacion:new Date().toISOString()}];
          const updated={...r,
            ejecutorConfirmado: ejListaUpdated.some(ej=>ej.confirmado),
            ejecutorRechazado: ejListaUpdated.every(ej=>ej.rechazado),
            fechaConfirmacion:new Date().toISOString(),
            calendarioAgendado: true,
            ejecutores_lista: ejListaUpdated,
            comentarios:[...(r.comentarios||[]),{texto:"Ejecutor "+mailParam+" confirmó responsabilidad.",fecha:new Date().toISOString(),autor:"Sistema"}]};
          await sbUpsert(updated);
          ls.set("lastConfirmedId", confirmarId);
          const _cf=getCatCfg(r.cat);
          const _cfDest=[...(_cf.responsables||[]).map(x=>x.mail),...(_cf.directivos||[]).map(x=>x.mail)].filter(Boolean);
          // Confirmation is shown in daily summary - no immediate email needed
        }
        setView("confirm_ok");
      } else if(rechazarId){
        const r=lista.find(r=>String(r.id)===rechazarId);
        const rechazarMail = params.get("mail") || r?.ejecutorMail;
        ls.set("pendingRechazar",{id:rechazarId,rec:r,mail:rechazarMail});
        setView("rechazar");
      } else if(validarId){
        // Ya no se procesa acá — se maneja en ValidarDetalleView
        setView("validar_detalle_"+validarId);
      } else if(rechazarValId){
        setView("rechazar_val_"+rechazarValId);
      } else if(calendarId){
        // Check if executor confirmed before allowing calendar
        const r=lista.find(r=>String(r.id)===calendarId);
        if(r){
          const ejLista = r.ejecutores_lista||[];
          const ejMatch = ejLista.find(e=>e.mail===calendarMail);
          const hasConfirmed = ejMatch ? ejMatch.confirmado : r.ejecutorConfirmado;
          if(hasConfirmed){
            // Generate and download ICS with both events
            const s = (r.fechaInicioEsperado||r.createdAt?.split("T")[0]||"").replace(/-/g,"");
            const e2 = (r.fechaCierre||r.fechaInicioEsperado||r.createdAt?.split("T")[0]||"").replace(/-/g,"");
            const appU = window.location.href.split("?")[0];
            const now = new Date().toISOString().replace(/[-:]/g,"").split(".")[0]+"Z";
            const isSameDay = s === e2;
            // Calcular día siguiente a fecha de cierre para DTEND all-day (iCal exclusive end)
            const e2obj = pld(r.fechaCierre||r.fechaInicioEsperado);
            e2obj.setDate(e2obj.getDate()+1);
            const e2next = e2obj.toISOString().split("T")[0].replace(/-/g,"");
            let dtStart, dtEnd, dtEndReminder;
            if(isSameDay && r.horaInicio) {
              // Evento con hora específica
              const hi = r.horaInicio.replace(":","")+"00";
              const hf = r.horaFin
                ? r.horaFin.replace(":","")+"00"
                : String(Number(r.horaInicio.split(":")[0])+1).padStart(2,"0")+(r.horaInicio.split(":")[1]||"00")+"00";
              dtStart = `DTSTART:${s}T${hi}`;
              dtEnd   = `DTEND:${s}T${hf}`;
              // Recordatorio: all-day en fecha de cierre
              dtEndReminder = `DTSTART;VALUE=DATE:${e2}\nDTEND;VALUE=DATE:${e2next}`;
            } else {
              // Evento all-day multi-día
              dtStart = `DTSTART;VALUE=DATE:${s}`;
              dtEnd   = `DTEND;VALUE=DATE:${e2next}`;
              // Recordatorio: all-day en fecha de cierre (mismo día)
              dtEndReminder = `DTSTART;VALUE=DATE:${e2}\nDTEND;VALUE=DATE:${e2next}`;
            }
            const ics = `BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//Asturiano//Reclamos//ES\nBEGIN:VEVENT\nUID:tarea-${r.id}@asturiano\nDTSTAMP:${now}\n${dtStart}\n${dtEnd}\nSUMMARY:Tarea ${r.sector} - ${r.numero}\nDESCRIPTION:${r.sub}\\n${r.desc}\\nCompletar: ${appU}?completar=${r.id}\nEND:VEVENT\nBEGIN:VEVENT\nUID:recordatorio-${r.id}@asturiano\nDTSTAMP:${now}\n${dtEndReminder}\nSUMMARY:Recordatorio cierre - ${r.numero}\nDESCRIPTION:Confirmar resolucion: ${appU}?completar=${r.id}\nEND:VEVENT\nEND:VCALENDAR`;
            const blob = new Blob([ics],{type:"text/calendar"});
            const url2 = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href=url2; a.download=`tarea-${r.numero}.ics`; a.click();
            URL.revokeObjectURL(url2);
          }
        }
        setView("calendar_result_"+(calendarId)+"_"+(calendarMail||""));
      } else if(completarId){
        setView("completar_"+completarId);
      } else if(calificarId){
        setView("calificar_"+calificarId);
      } else if(seguimientoN){
        setView("seguimiento_"+seguimientoN);
      } else if(reabrirId){
        const r=lista.find(r=>String(r.id)===reabrirId);
        if(r){
          const updated={...r,estadoAvance:"bajo_analisis",
            reabiertaEn:new Date().toISOString(),
            // Keep original createdAt and dates — times don't reset on reopen
            descripcionResolucion:"",
            comentarios:[...(r.comentarios||[]),{texto:"Solicitud reabierta — requiere revisión. Fechas originales se mantienen.",fecha:new Date().toISOString(),autor:"Sistema"}]};
          await sbUpsert(updated);
          // Notify responsable
          const respMail = getResponsableMail(r.cat);
          if(respMail) await sendEmail({to:respMail,subject:`[Asturiano]  Solicitud reabierta — ${r.numero}`,body:`El usuario reabrió la solicitud ${r.numero} (${r.sector}) porque no quedó conforme con la resolución.\n\nRequiere revisión inmediata.`});
          setView("reabrir_ok");
        }
      }

      setRecs(lista);
      const ej=ls.get("ejecutores_intendencia")||ls.get("ejecutores"); if(ej) setEjecutores(ej);
      await loadConfig(); // Cargar config desde Supabase
      setLoaded(true);
    })();
  },[]);

  // Refresh data periodically when in seguimiento view
  useEffect(()=>{
    if(!view || !view.startsWith("seguimiento_")) return;
    const interval = setInterval(async()=>{
      const lista = await sbGetAll();
      setRecs(lista);
    }, 10000); // refresh every 10 seconds
    return ()=>clearInterval(interval);
  },[view]);

  // Also refresh immediately when seguimiento view loads
  useEffect(()=>{
    if(!view || !view.startsWith("seguimiento_") || !loaded) return;
    sbGetAll().then(lista=>setRecs(lista));
  },[view, loaded]);

  const add = async rec => {
    // Fetch fresh recs from Supabase for accurate duplicate detection
    const recsFrescos = await sbGetAll();
    setRecs(recsFrescos);
    const duplicados = await detectarDuplicados(rec, recsFrescos);
    const recConDups = duplicados.length > 0 ? {...rec, posiblesDuplicados: duplicados} : rec;
    setRecs(prev=>[recConDups,...prev.filter(r=>r.id!==rec.id)]);
    await sbUpsert(recConDups);
  };
  const upd = async (rec, prevRec) => {
    setRecs(prev=>prev.map(r=>r.id===rec.id?rec:r));
    await sbUpsert(rec);
    const appUrl = window.location.href.split("?")[0];

    // Helper: notificar a todos los hijos consolidados con el mismo mensaje
    const notifHijos = async (subject, bodyFn) => {
      const hijos = (rec.reclamosHijos||[]);
      for(const num of hijos) {
        const hijo = recs.find(r=>r.numero===num);
        if(hijo?.email) {
          await sendEmail({to:hijo.email, subject, body:bodyFn(hijo)});
        }
      }
    };
    // Notify user when fecha cierre confirmed changes
    if(rec.email && prevRec && rec.fechaCierreConfirmada && prevRec.fechaCierreConfirmada && rec.fechaCierreConfirmada!==prevRec.fechaCierreConfirmada) {
      await sendEmail({to:rec.email,
        subject:`[Asturiano]  Actualización de fecha — ${rec.numero}`,
        body:`Hola ${rec.nombre},\n\nTe informamos que la fecha estimada de resolución de tu solicitud ${rec.numero} (${rec.sector}) fue actualizada.\n\nNueva fecha estimada: ${fd(rec.fechaCierreConfirmada)}\n${rec.motivoActualizacion?"Motivo: "+rec.motivoActualizacion+"\n":""}\nPodés seguir el estado en:\n${appUrl}?seguimiento=${rec.numero}\n\n— Equipo de Intendencia Asturiano`});
      await notifHijos(
        `[Asturiano]  Actualización de fecha — {numero}`,
        hijo=>`Hola ${hijo.nombre},\n\nTe informamos que la fecha estimada de resolución de tu solicitud ${hijo.numero} (${hijo.sector}) fue actualizada.\n\nNueva fecha estimada: ${fd(rec.fechaCierreConfirmada)}\n${rec.motivoActualizacion?"Motivo: "+rec.motivoActualizacion+"\n":""}\nPodés seguir el estado en:\n${appUrl}?seguimiento=${hijo.numero}\n\n— Equipo de Intendencia Asturiano`
      );
    }
    const seguimientoUrl = appUrl+"?seguimiento="+rec.numero;
    // Notificar al usuario cuando intendencia confirma fecha de resolución por primera vez
    if(rec.email && rec.fechaCierreConfirmada && prevRec && !prevRec.fechaCierreConfirmada){
      const _diasDesdeCreacion = rec.createdAt ? (pld(rec.fechaCierreConfirmada) - new Date(rec.createdAt)) / 86400000 : 0;
      const _esSinResolucion = rec.estadoAvance === "sin_resolucion";
      const _esDemoraLarga = _diasDesdeCreacion > 21;
      const _mailBody = (_esSinResolucion || _esDemoraLarga)
        ? `Hola ${rec.nombre},\n\nTu solicitud fue registrada pero requiere más tiempo del habitual para su resolución.\n\nNúmero: ${rec.numero}\nSector: ${rec.sector}\nFecha tentativa de resolución: ${fd(rec.fechaCierreConfirmada)}\n\nMotivo: ${rec.justificacionDemora||"—"}\n\nPodés seguir el estado en tiempo real:\n${seguimientoUrl}\n\nTe avisaremos cuando esté resuelto.\n\n— Equipo de Intendencia Asturiano`
        : `Hola ${rec.nombre},\n\nTu solicitud fue asignada y está siendo atendida por nuestro equipo.\n\nNúmero: ${rec.numero}\nSector: ${rec.sector}\nFecha tentativa de resolución: ${fd(rec.fechaCierreConfirmada)}\n\nSeguí el estado en tiempo real:\n${seguimientoUrl}\n\nTe avisaremos cuando esté resuelto.\n\n— Equipo de Intendencia Asturiano`;
      await sendEmail({to:rec.email,
        subject:`[Asturiano] Tu solicitud está siendo atendida — ${rec.numero}`,
        body: _mailBody});
      await notifHijos(
        `[Asturiano] Tu solicitud está siendo atendida — {numero}`,
        hijo=>`Hola ${hijo.nombre},\n\nTu solicitud ${hijo.numero} (${hijo.sector}) está siendo atendida por nuestro equipo junto con otra solicitud sobre el mismo problema.\n\nFecha tentativa de resolución: ${fd(rec.fechaCierreConfirmada)}\n\nSeguí el estado:\n${appUrl}?seguimiento=${hijo.numero}\n\n— Equipo de Intendencia Asturiano`
      );
    }
    // Resolution email is handled by notifResolucionAuto in EditModal save
    // Notificar al solicitante cuando se marca sin_resolucion por primera vez
    if(rec.email && rec.estadoAvance === "sin_resolucion" && prevRec && prevRec.estadoAvance !== "sin_resolucion" && rec.justificacionDemora?.trim()) {
      await sendEmail({to:rec.email,
        subject:`[Asturiano] Tu solicitud está registrada — ${rec.numero}`,
        body:`Hola ${rec.nombre},\n\nTu solicitud fue registrada pero requiere más tiempo del habitual para su resolución.\n\nNúmero: ${rec.numero}\nSector: ${rec.sector}\n\nMotivo: ${rec.justificacionDemora}\n\nPodés seguir el estado en tiempo real:\n${seguimientoUrl}\n\nTe avisaremos cuando haya novedades.\n\n— Equipo de Intendencia Asturiano`});
    }
  };

  const handleRechazar = async motivo => {
    const pending=ls.get("pendingRechazar");
    if(!pending) return;
    const {id,rec,mail:rechazarMail}=pending;
    if(!rec) return;
    // Update individual executor in lista
    const ejListaRej = (rec.ejecutores_lista||[]).map(ej=>
      ej.mail===rechazarMail ? {...ej,rechazado:true,confirmado:false,motivoRechazo:motivo} : ej
    );
    // Check if ALL executors rejected — if so clear executor assignment
    const allRejected = ejListaRej.length>0 && ejListaRej.every(ej=>ej.rechazado);
    const updated={...rec,
      ejecutores_lista: ejListaRej,
      ejecutorRechazado: allRejected,
      ejecutorConfirmado: ejListaRej.some(ej=>ej.confirmado),
      motivoRechazo: allRejected ? motivo : rec.motivoRechazo,
      estadoAvance: allRejected ? "bajo_analisis" : rec.estadoAvance,
      comentarios:[...(rec.comentarios||[]),{texto:`Ejecutor ${rechazarMail} rechazó. Motivo: ${motivo}`,fecha:new Date().toISOString(),autor:"Sistema"}]};
    await sbUpsert(updated);
    ls.set("pendingRechazar",null);
    setRecs(prev=>prev.map(r=>String(r.id)===String(id)?updated:r));
    const _rj=getCatCfg(rec.cat);
    const _rjDest=[...(_rj.responsables||[]).map(x=>x.mail),...(_rj.directivos||[]).map(x=>x.mail)].filter(Boolean);
    await sendEmail({to:_rjDest,
      subject:`[Asturiano]  Ejecutor rechazó — ${rec.numero}: ${rec.sector}`,
      body:`${rec.ejecutorNombre} rechazó la tarea ${rec.numero} (${rec.sector}).\n\nMotivo: ${motivo}\n\nDebés reasignar esta tarea.`});
    setView("rechazar_ok");
  };

  if(!loaded) return h('div',{style:{minHeight:"100vh",background:"#0f172a",display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontSize:18}},"Cargando...");

  if(view==="confirm_ok") {
    const confirmedRec = recs.find(r=>String(r.id)===String(ls.get("lastConfirmedId")));
    const _appUrl = window.location.href.split("?")[0];
    const _calLinks = confirmedRec && (confirmedRec.fechaInicioEsperado||confirmedRec.fechaInicioActualizada) ? (()=>{
      // Usar fechas actualizadas si existen (reprogramación), sino las originales
      const fInicio = confirmedRec.fechaInicioActualizada || confirmedRec.fechaInicioEsperado;
      const fCierre = confirmedRec.fechaCierreActualizada || confirmedRec.fechaCierre || fInicio;
      const isSameDay = fInicio === fCierre;
      return {
        tarea: buildGCalLink({
          titulo: "Tarea "+confirmedRec.sector+" — "+confirmedRec.numero,
          desc: "Descripcion: "+confirmedRec.desc+"\nCompletar: "+_appUrl+"?completar="+confirmedRec.id,
          fechaInicio: fInicio,
          fechaFin: fCierre,
          horaInicio: isSameDay ? confirmedRec.horaInicio : null,
          horaFin: isSameDay ? confirmedRec.horaFin : null,
        }),
        cierre: buildGCalReminderLink({
          titulo: "Recordatorio cierre — "+confirmedRec.numero,
          desc: "Confirmar que la tarea fue completada: "+_appUrl+"?completar="+confirmedRec.id,
          fechaFin: fCierre,
        }),
        esReprogramacion: !!(confirmedRec.fechaInicioActualizada || confirmedRec.fechaCierreActualizada),
      };
    })() : null;
    return h('div',{style:{minHeight:"100vh",background:"linear-gradient(135deg,#0f172a,#1e3a5f)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}},
    h('div',{style:{background:"white",borderRadius:20,padding:40,maxWidth:460,width:"100%",textAlign:"center",boxShadow:"0 20px 60px rgba(0,0,0,.3)"}},
      h('div',{style:{fontSize:64,marginBottom:16}},"✅"),
      h('h2',{style:{fontFamily:"'Playfair Display',serif",fontSize:26,color:"#0f172a",margin:"0 0 12px"}},"¡Tarea confirmada!"),
      h('p',{style:{color:"#64748b",fontSize:15,lineHeight:1.6}},"Confirmaste que asumís la responsabilidad. El responsable fue notificado."),
      _calLinks && _calLinks.esReprogramacion && h('div',{style:{background:"#fff7ed",border:"1.5px solid #fed7aa",borderRadius:10,padding:"10px 14px",margin:"16px 0",fontSize:13,color:"#92400e",textAlign:"left"}},
        "⚠️ Esta tarea fue reprogramada. Si ya tenías el evento anterior en tu calendario, eliminalo antes de agregar el nuevo."),
      _calLinks && h('div',{style:{marginTop:16,display:"flex",flexDirection:"column",gap:10}},
        h('p',{style:{color:"#374151",fontSize:13,fontWeight:600,marginBottom:4}},"Agregá los eventos a tu calendario:"),
        h('a',{href:_calLinks.tarea,target:"_blank",style:{display:"block",padding:"12px 20px",background:"#3b82f6",color:"white",textDecoration:"none",borderRadius:10,fontWeight:700,fontSize:14}},"Agregar tarea al calendario"),
        h('a',{href:_calLinks.cierre,target:"_blank",style:{display:"block",padding:"12px 20px",background:"#6b7280",color:"white",textDecoration:"none",borderRadius:10,fontWeight:700,fontSize:14}},"Agregar recordatorio de cierre")),
      h('p',{style:{color:"#94a3b8",fontSize:12,marginTop:16}},"Podés cerrar esta ventana cuando termines.")));
  }

  if(view==="rechazar_ok") return h('div',{style:{minHeight:"100vh",background:"linear-gradient(135deg,#0f172a,#1e3a5f)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}},
    h('div',{style:{background:"white",borderRadius:20,padding:40,maxWidth:420,width:"100%",textAlign:"center",boxShadow:"0 20px 60px rgba(0,0,0,.3)"}},
      h('div',{style:{fontSize:64,marginBottom:16}},"📨"),
      h('h2',{style:{fontFamily:"'Playfair Display',serif",fontSize:26,color:"#0f172a",margin:"0 0 12px"}},"Rechazo registrado"),
      h('p',{style:{color:"#64748b",fontSize:15,lineHeight:1.6}},"Tu respuesta fue registrada. El responsable fue notificado y reasignará la tarea."),
      h('p',{style:{color:"#94a3b8",fontSize:13,marginTop:16}},"Podés cerrar esta ventana.")));

  if(view==="validar_ok") return h('div',{style:{minHeight:"100vh",background:"linear-gradient(135deg,#0f172a,#1e3a5f)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}},
    h('div',{style:{background:"white",borderRadius:20,padding:40,maxWidth:420,width:"100%",textAlign:"center"}},
      h('div',{style:{fontSize:64,marginBottom:16}},"✅"),
      h('h2',{style:{fontFamily:"'Playfair Display',serif",fontSize:24,color:"#0f172a",margin:"0 0 12px"}},"Resolución validada"),
      h('p',{style:{color:"#64748b",fontSize:15,lineHeight:1.6}},"La resolución fue aprobada. El usuario recibirá el email para calificar la atención."),
      h('p',{style:{color:"#94a3b8",fontSize:13,marginTop:16}},"Podés cerrar esta ventana.")));
  if(view && view.startsWith("calendar_result_")) {
    const parts = view.replace("calendar_result_","").split("_");
    const cId = parts[0];
    const cMail = parts.slice(1).join("_");
    const r = recs.find(r=>String(r.id)===cId);
    const ejLista = r?.ejecutores_lista||[];
    const ejMatch = ejLista.find(e=>e.mail===cMail);
    const hasConfirmed = ejMatch ? ejMatch.confirmado : r?.ejecutorConfirmado;
    return h('div',{style:{minHeight:"100vh",background:"linear-gradient(135deg,#0f172a,#1e3a5f)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}},
      h('div',{style:{background:"white",borderRadius:20,padding:40,maxWidth:440,width:"100%",textAlign:"center"}},
        h('div',{style:{fontSize:64,marginBottom:16}},hasConfirmed?"📅":"⚠️"),
        h('h2',{style:{fontFamily:"'Playfair Display',serif",fontSize:24,color:"#0f172a",margin:"0 0 12px"}},
          hasConfirmed?"Eventos descargados":"Primero debés confirmar"),
        h('p',{style:{color:"#64748b",fontSize:15,lineHeight:1.6}},
          hasConfirmed
            ? "Se descargó el archivo .ics con los 2 eventos. Abrilo para agregarlos a tu calendario (Google, Apple, Outlook)."
            : "Para agregar la tarea al calendario, primero debés confirmar que la realizarás. Usá el link de confirmación en el mail que recibiste."),
        h('p',{style:{color:"#94a3b8",fontSize:13,marginTop:16}},"Podés cerrar esta ventana.")));
  }
  if(view && view.startsWith("rechazar_val_")) { return h(RechazarValidacionView,{recId:view.replace("rechazar_val_",""),recs,setRecs,loaded}); }
  if(view && view.startsWith("completar_")) { return h(CompletarView,{recId:view.replace("completar_",""),recs,setRecs,loaded}); }
  if(view && view.startsWith("calificar_")) { return h(CalificarView,{recId:Number(view.replace("calificar_","")),recs,setRecs,loaded}); }
  if(view && view.startsWith("ver_")) { return h(VerSolicitudPublica,{recId:Number(view.replace("ver_","")),recs,loaded}); }
  if(view && view.startsWith("validar_detalle_")) { return h(ValidarDetalleView,{recId:Number(view.replace("validar_detalle_","")),recs,setRecs,loaded,setView}); }

  if(view==="rechazar") return h(PantallaRechazo,{onConfirm:handleRechazar});

  // Seguimiento view — recarga datos frescos desde Supabase
  if(view && view.startsWith("seguimiento_")) {
    const numSeg = view.replace("seguimiento_","");
    // Still loading from Supabase
    if(!loaded) return h('div',{style:{minHeight:"100vh",background:"linear-gradient(135deg,#0f172a,#1e3a5f)",display:"flex",alignItems:"center",justifyContent:"center"}},
      h('div',{style:{textAlign:"center",color:"white"}},
        h('div',{style:{fontSize:40,marginBottom:16}},"🔍"),
        h('div',{style:{fontSize:18}},"Buscando tu solicitud...")));
    // Always get fresh data from Supabase for this specific reclamo
    const rec = recs.find(r=>r.numero===numSeg);
    if(!rec) return h('div',{style:{minHeight:"100vh",background:"linear-gradient(135deg,#0f172a,#1e3a5f)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}},
      h('div',{style:{background:"white",borderRadius:20,padding:40,maxWidth:420,width:"100%",textAlign:"center"}},
        h('div',{style:{fontSize:48,marginBottom:16}},"🔍"),
        h('h2',{style:{fontFamily:"'Playfair Display',serif",fontSize:22,margin:"0 0 12px"}},"Solicitud no encontrada"),
        h('p',{style:{color:"#64748b",fontSize:14}},"No encontramos la solicitud "+numSeg+". Verificá el número e intentá de nuevo."),
        h('button',{onClick:()=>setView("admin"),style:{marginTop:20,padding:"10px 24px",background:"#0f172a",color:"white",border:"none",borderRadius:10,cursor:"pointer",fontSize:14,fontWeight:600}},"Consultar otra solicitud")));
    const cat=CATS[rec.cat]; const pri=PRIS.find(p=>p.id===rec.pri);
    const est=ESTADOS.find(e=>e.id===rec.estadoAvance);
    const appUrl=window.location.href.split("?")[0];
    return h('div',{style:{minHeight:"100vh",background:"linear-gradient(135deg,#0f172a,#1e3a5f)",padding:"20px 16px 40px"}},
      h('div',{style:{textAlign:"center",marginBottom:24,paddingTop:20}},
        h('div',{style:{fontSize:11,letterSpacing:3,color:"#93c5fd",textTransform:"uppercase",marginBottom:8}},"Seguimiento de Solicitud"),
        h('h1',{style:{fontFamily:"'Playfair Display',serif",fontSize:26,color:"white",fontWeight:900}},rec.numero),
        h('div',{style:{width:40,height:3,background:"#3b82f6",margin:"10px auto 0",borderRadius:2}})),
      h('div',{style:{maxWidth:500,margin:"0 auto"}},
        h('div',{style:{background:"white",borderRadius:16,padding:"22px 20px"}},
          // Estado actual
          h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,paddingBottom:16,borderBottom:"1.5px solid #f1f5f9"}},
            h('div',null,
              h('div',{style:{fontSize:11,color:"#94a3b8",fontWeight:600,marginBottom:4,textTransform:"uppercase",letterSpacing:0.5}},"Estado actual"),
              h(Badge,{color:est?.color,label:est?.label,sm:false})),
            null),
          // Info
          h('div',{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:16}},
            h('div',null,h('div',{style:{fontSize:11,color:"#94a3b8",fontWeight:600,marginBottom:3,textTransform:"uppercase"}},"Sector"),h('div',{style:{fontSize:14,fontWeight:600,color:"#1e293b"}},rec.sector)),
            h('div',null,h('div',{style:{fontSize:11,color:"#94a3b8",fontWeight:600,marginBottom:3,textTransform:"uppercase"}},"Tipo"),h('div',{style:{fontSize:14}},cat?.icon+" "+cat?.label)),
            h('div',null,h('div',{style:{fontSize:11,color:"#94a3b8",fontWeight:600,marginBottom:3,textTransform:"uppercase"}},"Ingresado"),h('div',{style:{fontSize:14}},fd(rec.createdAt))),
            h('div',null,
              h('div',{style:{fontSize:11,color:"#94a3b8",fontWeight:600,marginBottom:3,textTransform:"uppercase"}},"Fecha tentativa de resolución"),
              rec.fechaCierreConfirmada
                ? h('div',{style:{fontSize:14,fontWeight:600,color:"#0f172a"}},fd(rec.fechaCierreConfirmada))
                : h('div',{style:{fontSize:13,color:"#94a3b8",fontStyle:"italic"}},"A definir por intendencia"))),
          h('div',{style:{marginBottom:16}},
            h('div',{style:{fontSize:11,color:"#94a3b8",fontWeight:600,marginBottom:4,textTransform:"uppercase"}},"Descripción"),
            h('div',{style:{fontSize:14,color:"#475569",lineHeight:1.6}},rec.desc)),
          rec.estadoAvance==="vinculado_proyecto" && rec.proyectoTitulo && h('div',{style:{background:"#f5f3ff",border:"1.5px solid #ddd6fe",borderRadius:12,padding:"14px 16px",marginBottom:16}},
            h('div',{style:{fontSize:11,color:"#5b21b6",fontWeight:700,marginBottom:6,textTransform:"uppercase"}},"🏗️ Vinculado a proyecto"),
            h('div',{style:{fontSize:14,fontWeight:600,color:"#4c1d95",marginBottom:4}},rec.proyectoTitulo),
            h('div',{style:{fontSize:13,color:"#6d28d9",lineHeight:1.5}},"Tu solicitud será resuelta como parte de este proyecto. Recibirás actualizaciones a medida que avance.")),
          rec.adjuntos && rec.adjuntos.filter(a=>a.url).length>0 && h('div',{style:{marginBottom:16}},
            h('div',{style:{fontSize:11,color:"#94a3b8",fontWeight:600,marginBottom:8,textTransform:"uppercase"}},"Fotos adjuntas"),
            h('div',{style:{display:"flex",gap:8,flexWrap:"wrap"}},
              ...rec.adjuntos.filter(a=>a.url).map((a,i)=>
                a.tipo?.startsWith("video")
                  ? h('a',{key:i,href:a.url,target:"_blank",style:{display:"inline-flex",alignItems:"center",gap:4,padding:"6px 12px",background:"#f1f5f9",borderRadius:8,fontSize:12,color:"#475569",fontWeight:600,textDecoration:"none"}},"🎥 Ver video")
                  : h('a',{key:i,href:a.url,target:"_blank"},
                      h('img',{src:a.url,alt:a.nombre,style:{width:80,height:80,objectFit:"cover",borderRadius:8,border:"1.5px solid #e2e8f0"}}))))),
          // Resolución si está completada
          rec.estadoAvance==="completada" && rec.descripcionResolucion && h('div',{style:{background:"#f0fdf4",border:"1.5px solid #bbf7d0",borderRadius:12,padding:"14px 16px",marginBottom:16}},
            h('div',{style:{fontSize:11,color:"#15803d",fontWeight:700,marginBottom:6,textTransform:"uppercase"}},"✅ Resolución"),
            h('div',{style:{fontSize:14,color:"#166534",lineHeight:1.6}},rec.descripcionResolucion),
            rec.evidenciaUrl && h('a',{href:rec.evidenciaUrl,target:"_blank",style:{display:"inline-block",marginTop:8,fontSize:13,color:"#15803d",fontWeight:600}},"📎 Ver evidencia →"),
            rec.adjuntosResolucion && rec.adjuntosResolucion.length>0 && h('div',{style:{marginTop:12,display:"flex",gap:8,flexWrap:"wrap"}},
              ...rec.adjuntosResolucion.filter(a=>a.url).map((a,i)=>
                h('a',{key:i,href:a.url,target:"_blank",style:{display:"inline-flex",alignItems:"center",gap:4,padding:"6px 12px",background:"#dcfce7",borderRadius:8,fontSize:12,color:"#15803d",fontWeight:600,textDecoration:"none"}},
                  a.tipo?.startsWith("video")?"🎥":"📷", a.nombre)))),
          // Reabrir si completada
          rec.estadoAvance==="completada" && h('div',{style:{background:"#fff7ed",border:"1.5px solid #fed7aa",borderRadius:10,padding:"12px 16px"}},
            h('div',{style:{fontSize:13,color:"#92400e",marginBottom:8}},"¿Querés calificar la resolución o solicitar reapertura?"),
            h('a',{href:appUrl+"?calificar="+rec.id,style:{display:"inline-block",padding:"8px 20px",background:"#f97316",color:"white",borderRadius:8,fontSize:13,fontWeight:600,textDecoration:"none"}},"⭐ Calificar resolución")))));
  }

  const navBtn = (v, label, active) => h('button',{onClick:()=>setView(v),style:{padding:"8px 16px",borderRadius:20,border:"none",background:active?"#0f172a":"rgba(255,255,255,0.9)",color:active?"white":"#374151",cursor:"pointer",fontSize:13,fontWeight:600,boxShadow:"0 2px 12px rgba(0,0,0,0.2)"}},label);

  const recsFiltrados = (area) => recs.filter(r => area==="intendencia"
    ? CATS_INTENDENCIA.includes(r.cat)
    : CATS_ADMINISTRACION.includes(r.cat));

  return h('div',null,
    h('div',{style:{position:"fixed",bottom:20,right:20,zIndex:999,display:"flex",gap:8}},
      navBtn("socio","📋 Formulario", view==="socio"),
      navBtn("intendencia","🔧 Intendencia", view==="intendencia"),
      navBtn("administracion","📊 Administración", view==="administracion")),
    view==="socio" && h(FormularioSocio,{onSubmit:add,reclamos:recs}),
    view==="intendencia" && !authInt && h(Login,{area:"intendencia",onLogin:()=>{setAuthInt(true);sessionStorage.setItem('authInt','1');}}),
    view==="intendencia" && authInt && h(PanelAdmin,{recs:recsFiltrados("intendencia"),onUpdate:upd,onRefresh:()=>sbGetAll().then(setRecs),area:"intendencia"}),
    view==="administracion" && !authAdm && h(Login,{area:"administracion",onLogin:()=>{setAuthAdm(true);sessionStorage.setItem('authAdm','1');}}),
    view==="administracion" && authAdm && h(PanelAdmin,{recs:recsFiltrados("administracion"),onUpdate:upd,onRefresh:()=>sbGetAll().then(setRecs),area:"administracion"}));
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
