async function sbUpsert(rec) {
  try {
    const r = await fetch(SUPABASE_URL+"/rest/v1/reclamos", {

      headers: {...SB_HEADERS, "Prefer":"resolution=merge-duplicates,return=minimal"},

  } catch(e) { console.error("sbUpsert error:", e); }
}

// ── SUPABASE STORAGE ──────────────────────────────────────────────────────
async function sbUploadFile(file, path) {
  try {
    // Convert base64 to blob
    const res = await fetch(file.data);
    const blob = await res.blob();
    const uploadRes = await fetch(
      `${SUPABASE_URL}/storage/v1/object/reclamos-adjuntos/${path}`,
      {
        method: "POST",
        headers: {
          "apikey": SUPABASE_KEY,
          "Authorization": "Bearer "+SUPABASE_KEY,
          "Content-Type": file.tipo||"application/octet-stream",
          "x-upsert": "true",
        },
        body: blob,
      }
    );
    if (uploadRes.ok) {
      const publicUrl = `${SUPABASE_URL}/storage/v1/object/public/reclamos-adjuntos/${path}`;
      console.log("Uploaded:", publicUrl);
      return publicUrl;
    } else {
      const err = await uploadRes.text();
      console.error("Upload error:", err);
      return null;
    }
  } catch(e) { console.error("Upload exception:", e); return null; }
}

async function uploadAdjuntos(adjuntos, reclamoId, prefijo) {
  const urls = [];
  for (const [i, adj] of adjuntos.entries()) {
    if (!adj.data) { urls.push({nombre:adj.nombre,url:adj.url||null,tipo:adj.tipo}); continue; }
    const ext = adj.nombre.split('.').pop()||"jpg";
    const path = `${prefijo}/${reclamoId}/${i}-${Date.now()}.${ext}`;
    const url = await sbUploadFile(adj, path);
    urls.push({nombre:adj.nombre, url, tipo:adj.tipo});
  }
  return urls;
}

// ── DUPLICATE DETECTION ──────────────────────────────────────────────────────
async function detectarDuplicados(nuevoRec, todosRecs) {
  // First filter by same sector + cat + sub
  const candidatos = todosRecs.filter(r =>
    r.id !== nuevoRec.id &&
    r.sector === nuevoRec.sector &&
    r.cat === nuevoRec.cat &&
    !["completada","consolidada"].includes(r.estadoAvance)
  );
  if (candidatos.length === 0) return [];

  // Use AI to compare descriptions
  try {
    const prompt = `Analizá si el nuevo reclamo es similar a alguno de los existentes.

NUEVO RECLAMO:
- Sector: ${nuevoRec.sector}
- Tipo: ${nuevoRec.cat} / ${nuevoRec.sub}
- Descripción: "${nuevoRec.desc}"

RECLAMOS EXISTENTES:
${candidatos.map((r,i)=>`${i+1}. [${r.numero}] ${r.sub} - "${r.desc}"`).join("\n")}

Respondé SOLO con JSON válido, sin texto adicional:
{"similares": [{"numero": "R-XXXXX", "similitud": "alta|media", "razon": "breve explicación en español"}]}
Si no hay similares, respondé: {"similares": []}`;

    const resp = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        model: "claude-haiku-4-5-20251001",
        max_tokens: 300,
        messages: [{role:"user", content: prompt}]
      })
    });
    const data = await resp.json();
    const text = (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
    const parsed = JSON.parse(text.replace(/```json|```/g,"").trim());
    return parsed.similares || [];
  } catch(e) {
    console.error("Duplicate detection error:", e);
    // Fallback: return candidatos as potentially similar
    return candidatos.slice(0,3).map(r=>({numero:r.numero, similitud:"media", razon:"Mismo sector y categoría"}));
  }
}

function CalificarView({recId, recs, setRecs, loaded}) {
  const rec = recs.find(r=>r.id===recId);
  const [stars,setStars] = useState(0);
  const [motivo,setMotivo] = useState("");
  const [done,setDone] = useState(false);
  const [sending,setSending] = useState(false);
  const appUrl = window.location.href.split("?")[0];

  const submitCalif = async () => {
    if(!stars) return;
    if(stars <= 3 && !motivo.trim()) return;
    setSending(true);
    const mailCfg = getMailConfig();
    const updated = {...rec, calificacion:stars, motivoCalificacion:motivo,
      estadoAvance: stars >= 4 ? "completada" : rec.estadoAvance,
      comentarios:[...(rec.comentarios||[]),{texto:`Usuario calificó con ${stars}⭐${motivo?". Motivo: "+motivo:""}`,fecha:new Date().toISOString(),autor:"Sistema"}]};
    await sbUpsert(updated);
    setRecs(prev=>prev.map(r=>r.id===recId?updated:r));
    const respMail = getResponsableMail(rec.cat) || NOTIFY_EMAIL;

            h('div',{style:{fontSize:14,color:"#475569",lineHeight:1.6}},rec.desc)),
          rec.estadoAvance==="vinculado_proyecto" && rec.proyectoTitulo && h('div',{style:{background:"#f5f3ff",border:"1.5px solid #ddd6fe",borderRadius:12,padding:"14px 16px",marginBottom:16}},
            h('div',{style:{fontSize:11,color:"#5b21b6",fontWeight:700,marginBottom:6,textTransform:"uppercase"}},"🏗️ Vinculado a proyecto"),
            h('div',{style:{fontSize:14,fontWeight:600,color:"#4c1d95",marginBottom:4}},rec.proyectoTitulo),
            h('div',{style:{fontSize:13,color:"#6d28d9",lineHeight:1.5}},"Tu reclamo será resuelto como parte de este proyecto. Recibirás actualizaciones a medida que avance.")),
          rec.adjuntos && rec.adjuntos.filter(a=>a.url).length>0 && h('div',{style:{marginBottom:16}},
            h('div',{style:{fontSize:11,color:"#94a3b8",fontWeight:600,marginBottom:8,textTransform:"uppercase"}},"Fotos adjuntas"),
            h('div',{style:{display:"flex",gap:8,flexWrap:"wrap"}},
              ...rec.adjuntos.filter(a=>a.url).map((a,i)=>
                a.tipo?.startsWith("video")
                  ? h('a',{key:i,href:a.url,target:"_blank",style:{display:"inline-flex",alignItems:"center",gap:4,padding:"6px 12px",background:"#f1f5f9",borderRadius:8,fontSize:12,color:"#475569",fontWeight:600,textDecoration:"none"}},"🎥 Ver video")
                  : h('a',{key:i,href:a.url,target:"_blank"},
                      h('img',{src:a.url,alt:a.nombre,style:{width:80,height:80,objectFit:"cover",borderRadius:8,border:"1.5px solid #e2e8f0"}}))))),
          // Resolución si está completada
          rec.estadoAvance==="completada" && rec.descripcionResolucion && h('div',{style:{background:"#f0fdf4",border:"1.5px solid #bbf7d0",borderRadius:12,padding:"14px 16px",marginBottom:16}},
            h('div',{style:{fontSize:11,color:"#15803d",fontWeight:700,marginBottom:6,textTransform:"uppercase"}},"✅ Resolución"),
            h('div',{style:{fontSize:14,color:"#166534",lineHeight:1.6}},rec.descripcionResolucion),
            rec.evidenciaUrl && h('a',{href:rec.evidenciaUrl,target:"_blank",style:{display:"inline-block",marginTop:8,fontSize:13,color:"#15803d",fontWeight:600}},"📎 Ver evidencia →"),
            rec.adjuntosResolucion && rec.adjuntosResolucion.length>0 && h('div',{style:{marginTop:12,display:"flex",gap:8,flexWrap:"wrap"}},
              ...rec.adjuntosResolucion.filter(a=>a.url).map((a,i)=>
                h('a',{key:i,href:a.url,target:"_blank",style:{display:"inline-flex",alignItems:"center",gap:4,padding:"6px 12px",background:"#dcfce7",borderRadius:8,fontSize:12,color:"#15803d",fontWeight:600,textDecoration:"none"}},
                  a.tipo?.startsWith("video")?"🎥":"📷", a.nombre)))),
          // Reabrir si completada
          rec.estadoAvance==="completada" && h('div',{style:{background:"#fff7ed",border:"1.5px solid #fed7aa",borderRadius:10,padding:"12px 16px"}},
            h('div',{style:{fontSize:13,color:"#92400e",marginBottom:8}},"¿Querés calificar la resolución o solicitar reapertura?"),
            h('a',{href:appUrl+"?calificar="+rec.id,style:{display:"inline-block",padding:"8px 20px",background:"#f97316",color:"white",borderRadius:8,fontSize:13,fontWeight:600,textDecoration:"none"}},"⭐ Calificar resolución")))));
  }

  return h('div',null,
    h('div',{style:{position:"fixed",bottom:20,right:20,zIndex:999,display:"flex",gap:8}},
      h('button',{onClick:()=>setView("socio"),style:{padding:"8px 16px",borderRadius:20,border:"none",background:view==="socio"?"#3b82f6":"rgba(255,255,255,0.9)",color:view==="socio"?"white":"#374151",cursor:"pointer",fontSize:13,fontWeight:600,boxShadow:"0 2px 12px rgba(0,0,0,0.2)"}},"📋 Formulario"),
      h('button',{onClick:()=>setView("admin"),style:{padding:"8px 16px",borderRadius:20,border:"none",background:view==="admin"?"#0f172a":"rgba(255,255,255,0.9)",color:view==="admin"?"white":"#374151",cursor:"pointer",fontSize:13,fontWeight:600,boxShadow:"0 2px 12px rgba(0,0,0,0.2)"}},"⚙️ Panel")),
    view==="socio" && h(FormularioSocio,{onSubmit:add,reclamos:recs}),
    view==="admin" && !auth && h(Login,{onLogin:()=>{setAuth(true);sessionStorage.setItem('panelAuth','1');},onSeguimiento:num=>setView("seguimiento_"+num)}),
    view==="admin" && auth && h(PanelAdmin,{recs,onUpdate:upd,ejecutores,setEjecutores,onRefresh:()=>sbGetAll().then(setRecs)}));
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
