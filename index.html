function getTiming(r) {
  if (["completada","consolidada","sin_resolucion","vinculado_proyecto"].includes(r.estadoAvance)) return null;
  if (!r.fechaCierre) return null;
  const d = (new Date(r.fechaCierre) - new Date()) / 86400000;
  if (d < 0)  return {label:"Vencido",    color:"#ef4444", bg:"#fef2f2"};
  if (d < 1)  return {label:"Vence hoy",  color:"#f97316", bg:"#fff7ed"};
  if (d < 5)  return {label:"Por vencer", color:"#eab308", bg:"#fefce8"};
  return {label:"A tiempo", color:"#22c55e", bg:"#f0fdf4"};
}

function getAccionRequerida(r) {
  if (["completada","consolidada","vinculado_proyecto"].includes(r.estadoAvance)) return null;
  const crit = r.criticidad || r.pri || "media";
  const plazoDias = {urgente:1,alta:2,media:3,baja:5}[crit] || 3;
  const diasCreado = (new Date() - new Date(r.createdAt)) / 86400000;
  if (!r.ejecutorMail || r.ejecutorMail.trim() === "") {
    if (diasCreado > plazoDias) return {label:"⚠️ Fuera de plazo — acción urgente", color:"#dc2626", bg:"#fef2f2"};
    if (crit === "urgente") return {label:"🔴 Urgente — asignar ahora", color:"#dc2626", bg:"#fef2f2"};
    return {label:"📋 Pendiente asignación", color:"#f97316", bg:"#fff7ed"};
  }
  if (r.ejecutorRechazado) return {label:"❌ Reasignar ejecutor", color:"#dc2626", bg:"#fef2f2"};
  if (!r.ejecutorConfirmado) return {label:"⏳ Esperando confirmación", color:"#1d4ed8", bg:"#eff6ff"};
  if (r.estadoAvance === "sin_resolucion") return {label:"🟡 Sin resolución — en seguimiento", color:"#d97706", bg:"#fffbeb"};
  if (r.estadoAvance === "esperando_validacion") return {label:"🔵 Esperando validación directivo", color:"#6d28d9", bg:"#f5f3ff"};
  return null;
}

// ── SUPABASE STORAGE ──────────────────────────────────────────────────────
async function sbUploadFile(file, path) {
  try {
    // Convert base64 to blob
    const res = await fetch(file.data);
    const blob = await res.blob();
    const uploadRes = await fetch(
      `${SUPABASE_URL}/storage/v1/object/reclamos-adjuntos/${path}`,
      {
        method: "POST",
        headers: {
          "apikey": SUPABASE_KEY,
          "Authorization": "Bearer "+SUPABASE_KEY,
          "Content-Type": file.tipo||"application/octet-stream",
          "x-upsert": "true",
        },
        body: blob,
      }
    );
    if (uploadRes.ok) {
      const publicUrl = `${SUPABASE_URL}/storage/v1/object/public/reclamos-adjuntos/${path}`;
      console.log("Uploaded:", publicUrl);
      return publicUrl;
    } else {
      const err = await uploadRes.text();
      console.error("Upload error:", err);
      return null;
    }
  } catch(e) { console.error("Upload exception:", e); return null; }
}

async function uploadAdjuntos(adjuntos, reclamoId, prefijo) {
  const urls = [];
  for (const [i, adj] of adjuntos.entries()) {
    if (!adj.data) { urls.push({nombre:adj.nombre,url:adj.url||null,tipo:adj.tipo}); continue; }
    const ext = adj.nombre.split('.').pop()||"jpg";
    const path = `${prefijo}/${reclamoId}/${i}-${Date.now()}.${ext}`;
    const url = await sbUploadFile(adj, path);
    urls.push({nombre:adj.nombre, url, tipo:adj.tipo});
  }
  return urls;
}

// ── DUPLICATE DETECTION ──────────────────────────────────────────────────────
async function detectarDuplicados(nuevoRec, todosRecs) {
  // First filter by same sector + cat + sub
  const candidatos = todosRecs.filter(r =>
    r.id !== nuevoRec.id &&
    r.sector === nuevoRec.sector &&
    r.cat === nuevoRec.cat &&
    !["completada","consolidada"].includes(r.estadoAvance)
  );
  if (candidatos.length === 0) return [];

  // Use AI to compare descriptions
  try {
    // Only compare descriptions - sector/cat match already filtered
    const prompt = `Compará la descripción del nuevo reclamo con los existentes. Evaluá similitud SOLO por descripción, ignorando sector/categoría que ya coinciden.

NUEVO RECLAMO [${nuevoRec.numero}]:
"${nuevoRec.desc}"

RECLAMOS EXISTENTES:
${candidatos.map((r,i)=>`${i+1}. [${r.numero}] "${r.desc}"`).join("\n")}

Respondé SOLO con JSON válido. Marcá "alta" solo si describen claramente el mismo problema físico. "media" si son parecidos pero pueden ser distintos.
{"similares": [{"numero": "R-XXXXX", "similitud": "alta|media", "razon": "breve explicación en español", "descExistente": "descripción del reclamo existente"}]}
Si no hay similares reales, respondé: {"similares": []}`;

    const resp = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        model: "claude-haiku-4-5-20251001",
        max_tokens: 300,
        messages: [{role:"user", content: prompt}]
      })
    });
    const data = await resp.json();
    const text = (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
    const parsed = JSON.parse(text.replace(/```json|```/g,"").trim());
    return parsed.similares || [];
  } catch(e) {
    console.error("Duplicate detection error:", e);
    // Fallback: return candidatos as potentially similar
    return candidatos.slice(0,3).map(r=>({numero:r.numero, similitud:"media", razon:"Mismo sector y categoría"}));
  }
}

  const [done,setDone] = useState(false);
  const [num,setNum] = useState("");
  const [err,setErr] = useState({});
  const [dup,setDup] = useState(null);
  const [sending,setSending] = useState(false);
  const fileRef = useRef();

  const set = (k,v) => {
    let extra = {};
    if (k==="cat") {
      extra = {sub:"", sector:""};
      // Auto-assign sector for admin categories
      if (["servicios","cuotas"].includes(v)) extra.sector = "Administración";
    }
    setF(p => ({...p,[k]:v,...extra}));
    // Duplicate detection removed from public form — handled internally by panel
  };

  const validate = () => {
    const e={};
    if(!f.tipo) e.tipo=true; if(!f.nombre.trim()) e.nombre=true;
    if(!f.email.trim()) e.email=true;
    if(!f.cat) e.cat=true;
    if(!["servicios","cuotas"].includes(f.cat) && !f.sector) e.sector=true;
    if((f.sector||["servicios","cuotas"].includes(f.cat)) && !f.sub) e.sub=true;
    if(!f.desc.trim()) e.desc=true;
    setErr(e); return !Object.keys(e).length;
  };

  const submit = async () => {
    if (!validate()) return;
    setSending(true);
    // Generate sequential number by category prefix
    const catPrefixes = {infraestructura:"O",limpieza:"L",mantenimiento:"M",equipamiento:"E",preparacion:"P",servicios:"S",cuotas:"C"};
    const prefix = catPrefixes[f.cat] || "R";
    const existing = reclamos.filter(r=>r.numero?.startsWith(prefix+"-")).length;
    const seq = String(existing+1).padStart(3,"0");
    const total = String(reclamos.length+1).padStart(3,"0");
    const n = prefix+"-"+total+"-"+seq;
    setNum(n);
    const catConf=CATS[f.cat], pri=PRIS.find(p=>p.id===f.pri);
    const rec = {...f, numero:n, id:Date.now(), createdAt:new Date().toISOString(),
      estadoAvance:"bajo_analisis", fechaCierre:"",
      responsableArea:{nombre:"",mail:""},
      comentarios:[], descripcionResolucion:"", presupuesto:"", presupuestoDetalle:"",
      ejecutorMail:"", ejecutorNombre:"", ejecutorConfirmado:false, ejecutorRechazado:false,
      evidenciaUrl:"", adjuntosResolucion:[]};
    // Upload adjuntos to Supabase Storage
    if(rec.adjuntos && rec.adjuntos.length > 0) {
      const urls = await uploadAdjuntos(rec.adjuntos, rec.id, "formulario");
      rec.adjuntos = urls;
    }
    await onSubmit(rec);
    const appUrl = window.location.href.split("?")[0];
    const seguimientoUrl = appUrl+"?seguimiento="+n;
    // Email a intendencia
    await sendEmail({to:NOTIFY_EMAIL, subject:`[Asturiano] Nuevo reclamo ${n} — ${f.sector}`,
      body:`Nuevo reclamo registrado.\n\nNúmero: ${n}\nSolicitante: ${f.tipo} — ${f.nombre}\nCelular: ${f.celular||"—"}\nEmail: ${f.email||"—"}\nSector: ${f.sector}${f.ubicacion?`\nUbicación exacta: ${f.ubicacion}`:""}\nTipo: ${catConf?.label} › ${f.sub}\nPrioridad: ${pri?.label}\nDescripción: ${f.desc}`});
    // Email de confirmación al usuario
    if(f.email) {
      await sendEmail({to:f.email, subject:`[Asturiano] Recibimos tu reclamo — ${n}`,
        body:`Hola ${f.nombre},\n\nRecibimos tu reclamo y ya está siendo procesado por el equipo de intendencia.\n\nNúmero de reclamo: ${n}\nSector: ${f.sector}\nProblema: ${catConf?.label} › ${f.sub}\nDescripción: ${f.desc}\n\nPodés seguir el estado de tu reclamo en cualquier momento acá:\n${seguimientoUrl}\n\nTe notificaremos cuando haya novedades.\n\n— Equipo de Intendencia Asturiano`});
    }
    setSending(false); setDone(true);
  };

  const aS = () => ({width:"100%",padding:"10px 14px",borderRadius:8,border:"1.5px solid #e2e8f0",fontSize:14,outline:"none",boxSizing:"border-box"});

  const selectEj = mail => { const ej=ejecutores.find(e=>e.mail===mail); set("ejecutorMail",mail); if(ej) set("ejecutorNombre",ej.nombre); };

  const save = async () => {
    setSaveErr("");
    // Block completada without resolution description
    if(f.estadoAvance==="completada" && !f.descripcionResolucion.trim()) {
      setSaveErr("Para marcar como completada debés describir qué se hizo en la tab Resolución.");
      setTab("resolucion");
      return;
    }
    // Skip executor/date validation when linked to a project
    const isVinculado = f.estadoAvance==="vinculado_proyecto" || f.proyectoVinculadoId;
    // Validate required fields for assignment (only if not linked to project)
    if(!isVinculado && (tab==="asignacion" || tab==="gestion")) {
      if(!f.ejecutorMail) { setSaveErr("Debés asignar un ejecutor antes de guardar."); return; }
      if(f.ejecutorMail && !f.nuevoComentario.trim() && !rec.comentarios?.some(c=>c.autor==="Intendencia")) { setSaveErr("El comentario para el ejecutor es obligatorio."); setTab("gestion"); return; }
      if(!f.fechaInicioEsperado && !rec.fechaInicioOriginal) { setSaveErr("La fecha de inicio es obligatoria."); return; }
      if(!f.fechaCierre && !rec.fechaOriginalCierre) { setSaveErr("La fecha de cierre es obligatoria."); return; }
      // Block save if fechaCierre is in the past without updated date (unless completada)
      if(f.estadoAvance !== "completada") {
        const fechaEfectiva = f.fechaCierreActualizada || f.fechaCierre || rec.fechaOriginalCierre;
        if(fechaEfectiva && new Date(fechaEfectiva) < new Date() && !f.fechaCierreActualizada && !f.motivoActualizacion?.trim()) {
          setSaveErr("La fecha de cierre está vencida. Debés ingresar una nueva fecha y el motivo del cambio.");

          return;

          setSaveErr("Si actualizás la fecha de cierre, el motivo es obligatorio.");
          setTab("gestion");
          return;

function ProyectosTab({recs, onUpdate, ejecutores}) {

  useEffect(()=>{

    if(saved) setProyectos(saved);
  },[]);

  const saveProyecto=async(p)=>{
    const lista=proyectos.find(x=>x.id===p.id)?proyectos.map(x=>x.id===p.id?p:x):[p,...proyectos];
    setProyectos(lista);
    ls.set("proyectos",lista);
    // Update linked reclamos with project data
    for(const num of (p.reclamosVinculados||[])){
      const rec=recs.find(r=>r.numero===num);
      if(rec){
        await onUpdate({
          ...rec,
          estadoAvance:"vinculado_proyecto",
          proyectoVinculado:p.id,
          proyectoTitulo:p.titulo,
          // Copy dates and description from project
          fechaInicioEsperado: p.fechaInicio||rec.fechaInicioEsperado,
          fechaCierre: p.fechaFin||rec.fechaCierre,
          fechaCierreConfirmada: p.fechaFin||rec.fechaCierreConfirmada,
          descripcionProyecto: p.descripcion,
          comentarios:[...(rec.comentarios||[]),{
            texto:`Vinculado al proyecto "${p.titulo}". Fechas actualizadas automáticamente según el proyecto.`,
            fecha:new Date().toISOString(),autor:"Sistema"

    }

  const ESTADOS_PROJ=[

function PanelAdmin({recs, onUpdate, ejecutores, setEjecutores, onRefresh}) {
  // Auto-refresh every 30 seconds
  useEffect(()=>{
    const interval = setInterval(()=>{ if(onRefresh) onRefresh(); }, 30000);
    return ()=>clearInterval(interval);
  },[]);
  const [filtros,setFiltros] = useState({estado:"",cat:"",sector:"",q:""});
  const [modal,setModal] = useState(null);
  const [view,setView] = useState("lista");
  const [mainTab,setMainTab] = useState("reclamos");
  const [showCfg,setShowCfg] = useState(false);
  const [checking,setChecking] = useState(false);
  const sf = (k,v) => setFiltros(f=>({...f,[k]:v}));

  const filtrados = recs.filter(r=>{
    if(filtros.estado&&r.estadoAvance!==filtros.estado) return false;
    if(filtros.cat&&r.cat!==filtros.cat) return false;
    if(filtros.sector&&r.sector!==filtros.sector) return false;
    if(filtros.q){const q=filtros.q.toLowerCase();if(!r.numero.toLowerCase().includes(q)&&!r.desc?.toLowerCase().includes(q)&&!r.sector.toLowerCase().includes(q))return false;}
    return true;
  }).sort((a,b)=>{
    const s=filtros.sort||"sector";
    if(s==="sector") return (a.sector||"").localeCompare(b.sector||"")||new Date(a.createdAt)-new Date(b.createdAt);
    if(s==="numero") return (a.numero||"").localeCompare(b.numero||"");
    if(s==="fecha") return new Date(b.createdAt)-new Date(a.createdAt);
    if(s==="criticidad"){const ord=["urgente","alta","media","baja"];return ord.indexOf(a.criticidad||a.pri)-ord.indexOf(b.criticidad||b.pri);}
    return 0;
  });

  const stats={
    total:recs.length,
    noIniciadas:recs.filter(r=>r.estadoAvance==="bajo_analisis").length,
    enCurso:recs.filter(r=>r.estadoAvance==="iniciada").length,
    demoradas:recs.filter(r=>r.estadoAvance==="demorada"||(!["completada","consolidada","sin_resolucion","vinculado_proyecto"].includes(r.estadoAvance)&&r.fechaCierre&&new Date(r.fechaCierre)<new Date())).length,
    completadas:recs.filter(r=>r.estadoAvance==="completada").length,
  };

  const testAlerts = async (diasSimulados) => {
    await checkAlerts(diasSimulados);
  };

  const checkAlerts = async (diasOverride) => {
    setChecking(true);
    const ahora = new Date();
    const appUrl = window.location.href.split("?")[0];
    let enviados = 0;
    let actualizados = [...recs];

    const diasDesdeRec = (isoDate) => {
      if(diasOverride != null) return diasOverride;
      return (ahora - new Date(isoDate)) / 86400000;
    };

    for (const r of recs) {
      if(["completada","consolidada","vinculado_proyecto"].includes(r.estadoAvance)) continue;

      const crit = r.criticidad || r.pri || "media";
      const plazos = ESCALADO[crit] || ESCALADO.media;
      const catCfg = getCatCfg(r.cat);
      const respMails = (catCfg.responsables||[]).map(x=>x.mail).filter(Boolean);
      const dirMails  = (catCfg.directivos||[]).map(x=>x.mail).filter(Boolean);
      const diasCreado = diasDesdeRec(r.createdAt);

      // CASO 1: Sin ejecutor o sin fechas
      if (!r.ejecutorMail || !r.fechaInicioOriginal) {
        if (diasCreado >= plazos.directivo) {
          const dest=[...dirMails,...respMails].filter(Boolean);
          if(dest.length){ await sendEmail({to:dest, subject:`[Asturiano]  Reclamo sin asignar — ${r.numero}`, body:`El reclamo ${r.numero} lleva ${formatTiempoJS(diasCreado)} sin ejecutor ni fechas.\n\nSector: ${r.sector}\nDescripción: ${r.desc}\nCriticidad: ${crit}\n\n${appUrl}`}); enviados++; }
        } else if (diasCreado >= plazos.recordatorio) {
          if(respMails.length){ await sendEmail({to:respMails, subject:`[Asturiano]  Reclamo pendiente de asignación — ${r.numero}`, body:`El reclamo ${r.numero} no tiene ejecutor ni fechas asignadas.\n\nSector: ${r.sector}\nDescripción: ${r.desc}\n\nIngresá al panel:\n${appUrl}`}); enviados++; }
        }
        continue;
      }

      // CASO 2: Ejecutor asignado pero no confirmó
      if (r.ejecutorMail && !r.ejecutorConfirmado && !r.ejecutorRechazado) {
        const diasAsig = r.fechaAsignacion ? diasDesdeRec(r.fechaAsignacion) : diasCreado;
        if (diasAsig >= plazos.directivo) {
          const dest=[...dirMails,...respMails].filter(Boolean);
          if(dest.length){ await sendEmail({to:dest, subject:`[Asturiano]  Ejecutor no confirmó — ${r.numero}`, body:`El ejecutor ${r.ejecutorNombre} no confirmó la tarea ${r.numero} hace ${formatTiempoJS(diasAsig)}.\n\nSector: ${r.sector}\n\nSe requiere reasignación.\n\n${appUrl}`}); enviados++; }
        } else if (diasAsig >= plazos.recordatorio) {
          const dest=[r.ejecutorMail,...respMails].filter(Boolean);
          if(dest.length){ await sendEmail({to:dest, subject:`[Asturiano]  Confirmación pendiente — ${r.numero}`, body:`Recordatorio: ${r.ejecutorNombre}, por favor confirmá o rechazá la tarea ${r.numero}.\n\nConfirmar: ${appUrl}?confirmar=${r.id}\nRechazar: ${appUrl}?rechazar=${r.id}`}); enviados++; }
        }
      }

      // CASO 3: Fecha de cierre excedida → marcar demorada
      const fechaCierre = r.fechaCierreActualizada || r.fechaCierre;
      if (fechaCierre && !diasOverride && new Date(fechaCierre)<ahora && r.estadoAvance!=="demorada") {
        const updated={...r,estadoAvance:"demorada",comentarios:[...(r.comentarios||[]),{texto:"Marcada automáticamente como demorada.",fecha:ahora.toISOString(),autor:"Sistema"}]};
        await sbUpsert(updated);
        actualizados=actualizados.map(x=>x.id===r.id?updated:x);
        const dest=[...dirMails,...respMails].filter(Boolean);
        if(dest.length){ await sendEmail({to:dest, subject:`[Asturiano]  Tarea demorada — ${r.numero}`, body:`La tarea ${r.numero} excedió su fecha de cierre.\n\nSector: ${r.sector}\nEjecutor: ${r.ejecutorNombre||"—"}\nFecha cierre: ${fd(fechaCierre)}\n\n${appUrl}`}); enviados++; }
      }

      // CASO 4: Recordatorio al ejecutor cuando llega fecha inicio
      const fechaInicio = r.fechaInicioActualizada || r.fechaInicioEsperado;
      if(r.ejecutorConfirmado && r.ejecutorMail && fechaInicio &&
         !diasOverride && new Date(fechaInicio)<=ahora && r.estadoAvance==="bajo_analisis"){
        await sendEmail({to:[r.ejecutorMail], subject:`[Asturiano]  Tu tarea empieza hoy — ${r.numero}`, body:`Hola ${r.ejecutorNombre},\n\nLa tarea ${r.numero} debería iniciarse hoy.\n\nSector: ${r.sector}\nDescripción: ${r.desc}\n\nCuando termines confirmá la resolución:\n${appUrl}?completar=${r.id}`});
        enviados++;
      }
    }

    if(!diasOverride) setRecs(actualizados);
    alert(enviados>0?`✅ Se enviaron ${enviados} notificaciones.`:"ℹ️ Sin alertas pendientes en este momento.");
    setChecking(false);
  };

  const formatTiempoJS = (dias) => {
    if(dias < 1/24) return Math.round(dias*1440)+" minutos";
    if(dias < 1)    return Math.round(dias*24)+" horas";
    return Math.round(dias)+" días";
  };
  const aS = () => ({padding:"8px 12px",borderRadius:8,border:"1.5px solid #e2e8f0",fontSize:13,outline:"none"});

  return h('div',{style:{minHeight:"100vh",background:"#f8fafc"}},
    // Header
    h('div',{style:{background:"#0f172a",padding:"14px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}},
      h('div',null,
        h('div',{style:{fontSize:11,color:"#60a5fa",letterSpacing:2,textTransform:"uppercase"}},"Panel de Gestión — Asturiano"),
        h('h1',{style:{fontFamily:"'Playfair Display',serif",color:"white",fontSize:22,margin:0}},"Intendencia — Asturiano")),
      h('div',{style:{display:"flex",gap:8}},
        h('button',{onClick:()=>setShowCfg(true),style:{padding:"8px 14px",background:"rgba(255,255,255,0.1)",color:"white",border:"1px solid rgba(255,255,255,0.2)",borderRadius:8,cursor:"pointer",fontSize:12,fontWeight:600}},"⚙️ Configuración"),

        h('button',{onClick:()=>{const d=prompt("Simular cuántos días transcurridos (ej: 4):");if(d&&!isNaN(d))testAlerts(Number(d));},style:{padding:"8px 14px",background:"rgba(255,255,255,0.1)",color:"white",border:"1px solid rgba(255,255,255,0.2)",borderRadius:8,cursor:"pointer",fontSize:12,fontWeight:600}},"🧪 Test"),
        h('button',{onClick:checkAlerts,disabled:checking,style:{padding:"8px 14px",background:checking?"#475569":"#f97316",color:"white",border:"none",borderRadius:8,cursor:"pointer",fontSize:12,fontWeight:600}},checking?"Verificando...":"⚠️ Revisar alertas"))),
    // Main tabs: Reclamos | Proyectos
    h('div',{style:{display:"flex",gap:4,padding:"0 24px",background:"#0f172a",borderBottom:"2px solid rgba(255,255,255,0.1)"}},
      ...[["reclamos","📋 Reclamos"],["proyectos","🏗️ Proyectos"]].map(([id,lbl])=>
        h('button',{key:id,onClick:()=>setMainTab(id),
          style:{padding:"10px 18px",border:"none",background:"none",cursor:"pointer",fontSize:13,fontWeight:mainTab===id?700:500,
            color:mainTab===id?"white":"rgba(255,255,255,0.5)",borderBottom:mainTab===id?"2px solid #3b82f6":"2px solid transparent",marginBottom:-2}},lbl))),
    mainTab==="reclamos" && h('div',{style:{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:12,padding:"18px 24px 0"}},
      ...[{l:"Total",v:stats.total,c:"#0f172a"},{l:"Bajo Análisis",v:stats.noIniciadas,c:"#6b7280"},{l:"En curso",v:stats.enCurso,c:"#3b82f6"},{l:"Demoradas",v:stats.demoradas,c:"#ef4444"},{l:"Completadas",v:stats.completadas,c:"#22c55e"}].map(s=>
        h('div',{key:s.l,style:{background:"white",borderRadius:12,padding:16,boxShadow:"0 1px 4px rgba(0,0,0,0.08)",borderTop:`3px solid ${s.c}`}},
          h('div',{style:{fontSize:26,fontWeight:800,color:s.c}},s.v),
          h('div',{style:{fontSize:12,color:"#64748b",fontWeight:500}},s.l)))),

        h('option',{value:""},"Todos los estados"),
        ...ESTADOS.map(e=>h('option',{key:e.id,value:e.id},e.label))),
      h('select',{value:filtros.cat,onChange:e=>sf("cat",e.target.value),style:aS()},
        h('option',{value:""},"Todas las categorías"),

      h('select',{value:filtros.sector,onChange:e=>sf("sector",e.target.value),style:aS()},
        h('option',{value:""},"Todos los sectores"),
        ...SECTORES_TODOS.map(s=>h('option',{key:s,value:s},s))),
      h('span',{style:{fontSize:13,color:"#94a3b8"}},filtrados.length+" reclamos"),
      h('select',{value:filtros.sort||"sector",onChange:e=>sf("sort",e.target.value),style:{padding:"7px 12px",borderRadius:8,border:"1.5px solid #e2e8f0",fontSize:12,outline:"none"}},
        h('option',{value:"sector"},"Ordenar: Sector"),

}

function CompletarView({recId, recs, setRecs, loaded}) {
  const rec = recs.find(r=>r.id===Number(recId));
  const [desc,setDesc] = useState("");
  const [err,setErr] = useState(false);
  const [done,setDone] = useState(false);
  const [sending,setSending] = useState(false);

      const rechazarId   = params.get("rechazar");
      const reabrirId    = params.get("reabrir");
      const seguimientoN = params.get("seguimiento");
      const calificarId  = params.get("calificar");
      const completarId  = params.get("completar");
      const validarId    = params.get("validar");
      const rechazarValId = params.get("rechazar_validacion");

      const lista = await sbGetAll();

      if(confirmarId){
        const r=lista.find(r=>String(r.id)===confirmarId);
        if(r){
          // Update individual executor in lista + global flag
          const mailParam = params.get("mail") || r.ejecutorMail;
          const ejListaUpdated = (r.ejecutores_lista||[]).map(ej=>
            ej.mail===mailParam ? {...ej,confirmado:true,rechazado:false,fechaConfirmacion:new Date().toISOString()} : ej
          );
          const allConfirmed = ejListaUpdated.length>0 && ejListaUpdated.every(ej=>ej.confirmado||ej.rechazado);
          const updated={...r,
            ejecutorConfirmado: ejListaUpdated.some(ej=>ej.confirmado)||true,
            ejecutorRechazado:false,
            fechaConfirmacion:new Date().toISOString(),
            ejecutores_lista: ejListaUpdated,
            comentarios:[...(r.comentarios||[]),{texto:"Ejecutor "+mailParam+" confirmó responsabilidad.",fecha:new Date().toISOString(),autor:"Sistema"}]};
          await sbUpsert(updated);
          const _cf=getCatCfg(r.cat);
          const _cfDest=[...(_cf.responsables||[]).map(x=>x.mail),...(_cf.directivos||[]).map(x=>x.mail)].filter(Boolean);
          // Confirmation is shown in daily summary - no immediate email needed
        }
        setView("confirm_ok");
      } else if(rechazarId){
        const r=lista.find(r=>String(r.id)===rechazarId);
        const rechazarMail = params.get("mail") || r?.ejecutorMail;
        ls.set("pendingRechazar",{id:rechazarId,rec:r,mail:rechazarMail});
        setView("rechazar");
      } else if(validarId){
        const r=lista.find(r=>String(r.id)===validarId);
        if(r){
          const appUrl=window.location.href.split("?")[0];
          const updated={...r,estadoAvance:"completada",
            comentarios:[...(r.comentarios||[]),{texto:"Resolución validada por directivo.",fecha:new Date().toISOString(),autor:"Directivo"}]};
          await sbUpsert(updated);
          setRecs(lista.map(x=>x.id===updated.id?updated:x));
          // Notify user with calificar link
          const catConf=CATS[r.cat];
          const mensajes={infraestructura:"nuestro equipo de obras revisó y resolvió el inconveniente",mantenimiento:"nuestro equipo de mantenimiento preventivo atendió el problema",limpieza:"nuestro equipo de limpieza atendió la situación",preparacion:"el espacio fue preparado correctamente",servicios:"nuestro equipo de atención al socio gestionó tu consulta",cuotas:"nuestro equipo administrativo resolvió tu consulta"};
          const msgCat=mensajes[r.cat]||"nuestro equipo atendió y resolvió el inconveniente";
          if(r.email) await sendEmail({to:r.email,
            subject:`[Asturiano]  Tu reclamo fue resuelto — ${r.numero}`,
            body:`Hola ${r.nombre},\n\nNos alegra informarte que el problema que reportaste en ${r.sector} fue resuelto. ${msgCat}.\n\n${r.descripcionResolucion?"Lo que se hizo:\n"+r.descripcionResolucion+"\n\n":""}Cuando tengas un momento, evaluá si el reclamo ha sido resuelto correctamente y calificá la atención. En caso de no estar conforme podés reabrir el ticket:\n${appUrl}?calificar=${r.id}\n\nGracias por ayudarnos a mejorar el club.\n\n— Equipo de Intendencia Asturiano`});
        }
        setView("validar_ok");
      } else if(rechazarValId){
        setView("rechazar_val_"+rechazarValId);
      } else if(completarId){
        setView("completar_"+completarId);
      } else if(calificarId){
        setView("calificar_"+calificarId);
      } else if(seguimientoN){
        setView("seguimiento_"+seguimientoN);
      } else if(reabrirId){
        const r=lista.find(r=>String(r.id)===reabrirId);
        if(r){
          const updated={...r,estadoAvance:"bajo_analisis",
            reabiertaEn:new Date().toISOString(),
            // Keep original createdAt and dates — times don't reset on reopen
            descripcionResolucion:"",
            comentarios:[...(r.comentarios||[]),{texto:"Reclamo reabierto — requiere revisión. Fechas originales se mantienen.",fecha:new Date().toISOString(),autor:"Sistema"}]};
          await sbUpsert(updated);
          // Notify responsable
          const respMail = getResponsableMail(r.cat);
          if(respMail) await sendEmail({to:respMail,subject:`[Asturiano]  Reclamo reabierto — ${r.numero}`,body:`El usuario reabrió el reclamo ${r.numero} (${r.sector}) porque no quedó conforme con la resolución.\n\nRequiere revisión inmediata.`});
          setView("reabrir_ok");
        }
      }

      setRecs(lista);
      const ej=ls.get("ejecutores"); if(ej) setEjecutores(ej);
      setLoaded(true);
    })();
  },[]);

  // Refresh data periodically when in seguimiento view
  useEffect(()=>{
    if(!view || !view.startsWith("seguimiento_")) return;
    const interval = setInterval(async()=>{
      const lista = await sbGetAll();
      setRecs(lista);
    }, 10000); // refresh every 10 seconds
    return ()=>clearInterval(interval);
  },[view]);

  // Also refresh immediately when seguimiento view loads
  useEffect(()=>{
    if(!view || !view.startsWith("seguimiento_") || !loaded) return;
    sbGetAll().then(lista=>setRecs(lista));
  },[view, loaded]);

  const add = async rec => {
    // Run duplicate detection
    const duplicados = await detectarDuplicados(rec, recs);
    const recConDups = duplicados.length > 0 ? {...rec, posiblesDuplicados: duplicados} : rec;
    setRecs(prev=>[recConDups,...prev]);
    await sbUpsert(recConDups);
  };
  const upd = async (rec, prevRec) => {
    setRecs(prev=>prev.map(r=>r.id===rec.id?rec:r));
    await sbUpsert(rec);
    const appUrl = window.location.href.split("?")[0];
    // Notify user when linked to a project
    if(rec.email && prevRec && rec.proyectoVinculadoId && rec.proyectoVinculadoId!==prevRec.proyectoVinculadoId) {
      await sendEmail({to:rec.email,
        subject:`[Asturiano] Tu reclamo fue vinculado a un proyecto — ${rec.numero}`,
        body:`Hola ${rec.nombre},\n\nTu reclamo ${rec.numero} (${rec.sector}) fue vinculado al proyecto "${rec.proyectoTitulo}".\n\nEsto significa que el problema que reportaste será resuelto como parte de una obra o proyecto mayor. Recibirás actualizaciones a medida que el proyecto avance.\n\nPodés seguir el estado de tu reclamo:\n${appUrl}?seguimiento=${rec.numero}\n\n— Equipo de Intendencia Asturiano`});
    }
    // Notify user when fecha cierre confirmed changes
    if(rec.email && prevRec && rec.fechaCierreConfirmada && prevRec.fechaCierreConfirmada && rec.fechaCierreConfirmada!==prevRec.fechaCierreConfirmada) {
      await sendEmail({to:rec.email,
        subject:`[Asturiano]  Actualización de fecha — ${rec.numero}`,
        body:`Hola ${rec.nombre},\n\nTe informamos que la fecha estimada de resolución de tu reclamo ${rec.numero} (${rec.sector}) fue actualizada.\n\nNueva fecha estimada: ${fd(rec.fechaCierreConfirmada)}\n${rec.motivoActualizacion?"Motivo: "+rec.motivoActualizacion+"\n":""}\nPodés seguir el estado en:\n${appUrl}?seguimiento=${rec.numero}\n\n— Equipo de Intendencia Asturiano`});
    }
    const seguimientoUrl = appUrl+"?seguimiento="+rec.numero;
    // Notificar al usuario cuando intendencia confirma fecha de resolución por primera vez
    if(rec.email && rec.fechaCierreConfirmada && prevRec && !prevRec.fechaCierreConfirmada){
      await sendEmail({to:rec.email,
        subject:`[Asturiano] Tu reclamo está siendo atendido — ${rec.numero}`,
        body:`Hola ${rec.nombre},

Tu reclamo fue asignado y está siendo atendido por nuestro equipo.

Número: ${rec.numero}
Sector: ${rec.sector}
Fecha tentativa de resolución: ${fd(rec.fechaCierreConfirmada)}

Seguí el estado en tiempo real:
${seguimientoUrl}

Te avisaremos cuando esté resuelto.

— Equipo de Intendencia Asturiano`});
    }
    // Resolution email is handled by notifResolucionAuto in EditModal save
  };

  const handleRechazar = async motivo => {
    const pending=ls.get("pendingRechazar");
    if(!pending) return;
    const {id,rec}=pending;
    if(!rec) return;
    const updated={...rec,ejecutorRechazado:true,ejecutorConfirmado:false,
      motivoRechazo:motivo,ejecutorMail:"",ejecutorNombre:"",estadoAvance:"no_iniciada",
      comentarios:[...(rec.comentarios||[]),{texto:`Ejecutor rechazó. Motivo: ${motivo}`,fecha:new Date().toISOString(),autor:"Sistema"}]};
    await sbUpsert(updated);
    ls.set("pendingRechazar",null);
    setRecs(prev=>prev.map(r=>String(r.id)===String(id)?updated:r));
    const _rj=getCatCfg(rec.cat);
    const _rjDest=[...(_rj.responsables||[]).map(x=>x.mail),...(_rj.directivos||[]).map(x=>x.mail)].filter(Boolean);
    await sendEmail({to:_rjDest,
      subject:`[Asturiano]  Ejecutor rechazó — ${rec.numero}: ${rec.sector}`,
      body:`${rec.ejecutorNombre} rechazó la tarea ${rec.numero} (${rec.sector}).\n\nMotivo: ${motivo}\n\nDebés reasignar esta tarea.`});
    setView("rechazar_ok");
  };

  if(!loaded) return h('div',{style:{minHeight:"100vh",background:"#0f172a",display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontSize:18}},"Cargando...");

  if(view==="confirm_ok") return h('div',{style:{minHeight:"100vh",background:"linear-gradient(135deg,#0f172a,#1e3a5f)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}},
    h('div',{style:{background:"white",borderRadius:20,padding:40,maxWidth:420,width:"100%",textAlign:"center",boxShadow:"0 20px 60px rgba(0,0,0,.3)"}},
      h('div',{style:{fontSize:64,marginBottom:16}},"✅"),
      h('h2',{style:{fontFamily:"'Playfair Display',serif",fontSize:26,color:"#0f172a",margin:"0 0 12px"}},"¡Tarea confirmada!"),
      h('p',{style:{color:"#64748b",fontSize:15,lineHeight:1.6}},"Confirmaste que asumís la responsabilidad. El responsable del área fue notificado."),
      h('p',{style:{color:"#94a3b8",fontSize:13,marginTop:16}},"Podés cerrar esta ventana.")));

  if(view==="rechazar_ok") return h('div',{style:{minHeight:"100vh",background:"linear-gradient(135deg,#0f172a,#1e3a5f)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}},
    h('div',{style:{background:"white",borderRadius:20,padding:40,maxWidth:420,width:"100%",textAlign:"center",boxShadow:"0 20px 60px rgba(0,0,0,.3)"}},
      h('div',{style:{fontSize:64,marginBottom:16}},"📨"),
      h('h2',{style:{fontFamily:"'Playfair Display',serif",fontSize:26,color:"#0f172a",margin:"0 0 12px"}},"Rechazo registrado"),
      h('p',{style:{color:"#64748b",fontSize:15,lineHeight:1.6}},"Tu respuesta fue registrada. El responsable fue notificado y reasignará la tarea."),
      h('p',{style:{color:"#94a3b8",fontSize:13,marginTop:16}},"Podés cerrar esta ventana.")));

  if(view==="validar_ok") return h('div',{style:{minHeight:"100vh",background:"linear-gradient(135deg,#0f172a,#1e3a5f)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}},
    h('div',{style:{background:"white",borderRadius:20,padding:40,maxWidth:420,width:"100%",textAlign:"center"}},
      h('div',{style:{fontSize:64,marginBottom:16}},"✅"),
      h('h2',{style:{fontFamily:"'Playfair Display',serif",fontSize:24,color:"#0f172a",margin:"0 0 12px"}},"Resolución validada"),
      h('p',{style:{color:"#64748b",fontSize:15,lineHeight:1.6}},"La resolución fue aprobada. El usuario recibirá el email para calificar la atención."),
      h('p',{style:{color:"#94a3b8",fontSize:13,marginTop:16}},"Podés cerrar esta ventana.")));
  if(view && view.startsWith("rechazar_val_")) { return h(RechazarValidacionView,{recId:view.replace("rechazar_val_",""),recs,setRecs,loaded}); }
  if(view && view.startsWith("completar_")) { return h(CompletarView,{recId:view.replace("completar_",""),recs,setRecs,loaded}); }
  if(view && view.startsWith("calificar_")) { return h(CalificarView,{recId:Number(view.replace("calificar_","")),recs,setRecs,loaded}); }

  if(view==="rechazar") return h(PantallaRechazo,{onConfirm:handleRechazar});

  // Seguimiento view — recarga datos frescos desde Supabase
  if(view && view.startsWith("seguimiento_")) {
    const numSeg = view.replace("seguimiento_","");
    // Still loading from Supabase
    if(!loaded) return h('div',{style:{minHeight:"100vh",background:"linear-gradient(135deg,#0f172a,#1e3a5f)",display:"flex",alignItems:"center",justifyContent:"center"}},
      h('div',{style:{textAlign:"center",color:"white"}},
        h('div',{style:{fontSize:40,marginBottom:16}},"🔍"),
        h('div',{style:{fontSize:18}},"Buscando tu reclamo...")));
    // Always get fresh data from Supabase for this specific reclamo
    const rec = recs.find(r=>r.numero===numSeg);
    if(!rec) return h('div',{style:{minHeight:"100vh",background:"linear-gradient(135deg,#0f172a,#1e3a5f)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}},
      h('div',{style:{background:"white",borderRadius:20,padding:40,maxWidth:420,width:"100%",textAlign:"center"}},
        h('div',{style:{fontSize:48,marginBottom:16}},"🔍"),
        h('h2',{style:{fontFamily:"'Playfair Display',serif",fontSize:22,margin:"0 0 12px"}},"Reclamo no encontrado"),
        h('p',{style:{color:"#64748b",fontSize:14}},"No encontramos el reclamo "+numSeg+". Verificá el número e intentá de nuevo."),
        h('button',{onClick:()=>setView("admin"),style:{marginTop:20,padding:"10px 24px",background:"#0f172a",color:"white",border:"none",borderRadius:10,cursor:"pointer",fontSize:14,fontWeight:600}},"Consultar otro reclamo")));
    const cat=CATS[rec.cat]; const pri=PRIS.find(p=>p.id===rec.pri);
    const est=ESTADOS.find(e=>e.id===rec.estadoAvance);
    const appUrl=window.location.href.split("?")[0];
    return h('div',{style:{minHeight:"100vh",background:"linear-gradient(135deg,#0f172a,#1e3a5f)",padding:"20px 16px 40px"}},
      h('div',{style:{textAlign:"center",marginBottom:24,paddingTop:20}},
        h('div',{style:{fontSize:11,letterSpacing:3,color:"#93c5fd",textTransform:"uppercase",marginBottom:8}},"Seguimiento de Reclamo"),
        h('h1',{style:{fontFamily:"'Playfair Display',serif",fontSize:26,color:"white",fontWeight:900}},rec.numero),
        h('div',{style:{width:40,height:3,background:"#3b82f6",margin:"10px auto 0",borderRadius:2}})),
      h('div',{style:{maxWidth:500,margin:"0 auto"}},
        h('div',{style:{background:"white",borderRadius:16,padding:"22px 20px"}},
          // Estado actual
          h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,paddingBottom:16,borderBottom:"1.5px solid #f1f5f9"}},
            h('div',null,
              h('div',{style:{fontSize:11,color:"#94a3b8",fontWeight:600,marginBottom:4,textTransform:"uppercase",letterSpacing:0.5}},"Estado actual"),
              h(Badge,{color:est?.color,label:est?.label,sm:false})),
            null),
          // Info
          h('div',{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:16}},
            h('div',null,h('div',{style:{fontSize:11,color:"#94a3b8",fontWeight:600,marginBottom:3,textTransform:"uppercase"}},"Sector"),h('div',{style:{fontSize:14,fontWeight:600,color:"#1e293b"}},rec.sector)),
            h('div',null,h('div',{style:{fontSize:11,color:"#94a3b8",fontWeight:600,marginBottom:3,textTransform:"uppercase"}},"Tipo"),h('div',{style:{fontSize:14}},cat?.icon+" "+cat?.label)),
            h('div',null,h('div',{style:{fontSize:11,color:"#94a3b8",fontWeight:600,marginBottom:3,textTransform:"uppercase"}},"Ingresado"),h('div',{style:{fontSize:14}},fd(rec.createdAt))),
            h('div',null,
              h('div',{style:{fontSize:11,color:"#94a3b8",fontWeight:600,marginBottom:3,textTransform:"uppercase"}},"Fecha tentativa de resolución"),
              rec.fechaCierreConfirmada
                ? h('div',{style:{fontSize:14,fontWeight:600,color:"#0f172a"}},fd(rec.fechaCierreConfirmada))
                : h('div',{style:{fontSize:13,color:"#94a3b8",fontStyle:"italic"}},"A definir por intendencia"))),
          h('div',{style:{marginBottom:16}},
            h('div',{style:{fontSize:11,color:"#94a3b8",fontWeight:600,marginBottom:4,textTransform:"uppercase"}},"Descripción"),
            h('div',{style:{fontSize:14,color:"#475569",lineHeight:1.6}},rec.desc)),
          rec.estadoAvance==="vinculado_proyecto" && rec.proyectoTitulo && h('div',{style:{background:"#f5f3ff",border:"1.5px solid #ddd6fe",borderRadius:12,padding:"14px 16px",marginBottom:16}},
            h('div',{style:{fontSize:11,color:"#5b21b6",fontWeight:700,marginBottom:6,textTransform:"uppercase"}},"🏗️ Vinculado a proyecto"),
            h('div',{style:{fontSize:14,fontWeight:600,color:"#4c1d95",marginBottom:4}},rec.proyectoTitulo),
            h('div',{style:{fontSize:13,color:"#6d28d9",lineHeight:1.5}},"Tu reclamo será resuelto como parte de este proyecto. Recibirás actualizaciones a medida que avance.")),
          rec.adjuntos && rec.adjuntos.filter(a=>a.url).length>0 && h('div',{style:{marginBottom:16}},
            h('div',{style:{fontSize:11,color:"#94a3b8",fontWeight:600,marginBottom:8,textTransform:"uppercase"}},"Fotos adjuntas"),
            h('div',{style:{display:"flex",gap:8,flexWrap:"wrap"}},
              ...rec.adjuntos.filter(a=>a.url).map((a,i)=>
                a.tipo?.startsWith("video")
                  ? h('a',{key:i,href:a.url,target:"_blank",style:{display:"inline-flex",alignItems:"center",gap:4,padding:"6px 12px",background:"#f1f5f9",borderRadius:8,fontSize:12,color:"#475569",fontWeight:600,textDecoration:"none"}},"🎥 Ver video")
                  : h('a',{key:i,href:a.url,target:"_blank"},
                      h('img',{src:a.url,alt:a.nombre,style:{width:80,height:80,objectFit:"cover",borderRadius:8,border:"1.5px solid #e2e8f0"}}))))),
          // Resolución si está completada
          rec.estadoAvance==="completada" && rec.descripcionResolucion && h('div',{style:{background:"#f0fdf4",border:"1.5px solid #bbf7d0",borderRadius:12,padding:"14px 16px",marginBottom:16}},
            h('div',{style:{fontSize:11,color:"#15803d",fontWeight:700,marginBottom:6,textTransform:"uppercase"}},"✅ Resolución"),
            h('div',{style:{fontSize:14,color:"#166534",lineHeight:1.6}},rec.descripcionResolucion),
            rec.evidenciaUrl && h('a',{href:rec.evidenciaUrl,target:"_blank",style:{display:"inline-block",marginTop:8,fontSize:13,color:"#15803d",fontWeight:600}},"📎 Ver evidencia →"),
            rec.adjuntosResolucion && rec.adjuntosResolucion.length>0 && h('div',{style:{marginTop:12,display:"flex",gap:8,flexWrap:"wrap"}},
              ...rec.adjuntosResolucion.filter(a=>a.url).map((a,i)=>
                h('a',{key:i,href:a.url,target:"_blank",style:{display:"inline-flex",alignItems:"center",gap:4,padding:"6px 12px",background:"#dcfce7",borderRadius:8,fontSize:12,color:"#15803d",fontWeight:600,textDecoration:"none"}},
                  a.tipo?.startsWith("video")?"🎥":"📷", a.nombre)))),
          // Reabrir si completada
          rec.estadoAvance==="completada" && h('div',{style:{background:"#fff7ed",border:"1.5px solid #fed7aa",borderRadius:10,padding:"12px 16px"}},
            h('div',{style:{fontSize:13,color:"#92400e",marginBottom:8}},"¿Querés calificar la resolución o solicitar reapertura?"),
            h('a',{href:appUrl+"?calificar="+rec.id,style:{display:"inline-block",padding:"8px 20px",background:"#f97316",color:"white",borderRadius:8,fontSize:13,fontWeight:600,textDecoration:"none"}},"⭐ Calificar resolución")))));
  }

  return h('div',null,
    h('div',{style:{position:"fixed",bottom:20,right:20,zIndex:999,display:"flex",gap:8}},
      h('button',{onClick:()=>setView("socio"),style:{padding:"8px 16px",borderRadius:20,border:"none",background:view==="socio"?"#3b82f6":"rgba(255,255,255,0.9)",color:view==="socio"?"white":"#374151",cursor:"pointer",fontSize:13,fontWeight:600,boxShadow:"0 2px 12px rgba(0,0,0,0.2)"}},"📋 Formulario"),
      h('button',{onClick:()=>setView("admin"),style:{padding:"8px 16px",borderRadius:20,border:"none",background:view==="admin"?"#0f172a":"rgba(255,255,255,0.9)",color:view==="admin"?"white":"#374151",cursor:"pointer",fontSize:13,fontWeight:600,boxShadow:"0 2px 12px rgba(0,0,0,0.2)"}},"⚙️ Panel")),
    view==="socio" && h(FormularioSocio,{onSubmit:add,reclamos:recs}),
    view==="admin" && !auth && h(Login,{onLogin:()=>{setAuth(true);sessionStorage.setItem('panelAuth','1');}}),
    view==="admin" && auth && h(PanelAdmin,{recs,onUpdate:upd,ejecutores,setEjecutores,onRefresh:()=>sbGetAll().then(setRecs)}));
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
