// ── GOOGLE CALENDAR LINK BUILDER ──────────────────────────────────────────
function buildGCalLink({titulo, desc, fechaInicio, fechaFin, horaInicio, horaFin}) {
  const isSameDay = fechaInicio && fechaFin && fechaInicio === fechaFin;
  const s = (fechaInicio||"").replace(/-/g,"");
  const e = (fechaFin||fechaInicio||"").replace(/-/g,"");

  let dates;
  if(isSameDay && horaInicio) {
    // Evento con hora: formato YYYYMMDDTHHMMSS
    const hi = horaInicio.replace(":","")+"00";
    let hf;
    if(horaFin) {
      hf = horaFin.replace(":","")+"00";
    } else {
      const h = parseInt(horaInicio.split(":")[0]);
      const m = horaInicio.split(":")[1]||"00";
      hf = String(h+1).padStart(2,"0")+m+"00";
    }
    dates = `${s}T${hi}/${s}T${hf}`;
  } else if(isSameDay) {
    // Same day sin hora: all-day, end = mismo día + 1 (exclusive)
    const parts = (fechaFin||fechaInicio).split("-");
    const endDateObj = new Date(Number(parts[0]), Number(parts[1])-1, Number(parts[2])+1);
    const eNext = endDateObj.getFullYear()+
      String(endDateObj.getMonth()+1).padStart(2,"0")+
      String(endDateObj.getDate()).padStart(2,"0");
    dates = `${s}/${eNext}`;
  } else {
    // Multi-day all-day: end exclusive (día siguiente al último)
    const parts = (fechaFin||fechaInicio).split("-");
    const endDateObj = new Date(Number(parts[0]), Number(parts[1])-1, Number(parts[2])+1);
    const eNext = endDateObj.getFullYear()+
      String(endDateObj.getMonth()+1).padStart(2,"0")+
      String(endDateObj.getDate()).padStart(2,"0");
    dates = `${s}/${eNext}`;
  }

  return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(titulo)}&dates=${dates}&details=${encodeURIComponent(desc)}`;
}

function buildGCalReminderLink({titulo, desc, fechaFin}) {
  // Recordatorio all-day en la fecha de cierre
  const parts = (fechaFin||"").split("-");
  const e = parts.join(""); // YYYYMMDD sin guiones
  const endDateObj = new Date(Number(parts[0]), Number(parts[1])-1, Number(parts[2])+1);
  const eNext = endDateObj.getFullYear()+
    String(endDateObj.getMonth()+1).padStart(2,"0")+
    String(endDateObj.getDate()).padStart(2,"0");
  return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(titulo)}&dates=${e}/${eNext}&details=${encodeURIComponent(desc)}`;
}

// ── HELPERS ────────────────────────────────────────────────────────────────
const fd  = iso => {
  if(!iso) return "—";
  // Parsear sin timezone para evitar corrimiento en Argentina (UTC-3)
  const parts = iso.split("T")[0].split("-");
  if(parts.length === 3) {
    const d = new Date(Number(parts[0]), Number(parts[1])-1, Number(parts[2]));
    return d.toLocaleDateString("es-AR",{day:"2-digit",month:"2-digit",year:"numeric"});
  }
  return new Date(iso).toLocaleDateString("es-AR",{day:"2-digit",month:"2-digit",year:"numeric"});
};
const fdt = iso => iso ? new Date(iso).toLocaleString("es-AR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"}) : "—";
const hoy = () => { const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); };
// Parsea un string YYYY-MM-DD como fecha LOCAL (sin corrimiento UTC/timezone)
const pld = iso => { if(!iso) return new Date(NaN); const p=iso.split("T")[0].split("-"); return new Date(Number(p[0]),Number(p[1])-1,Number(p[2])); };

function getTiming(r) {
  if (["completada","consolidada","sin_resolucion","vinculado_proyecto"].includes(r.estadoAvance)) return null;
  if (!r.fechaCierre) return null;
  const d = (pld(r.fechaCierre) - new Date()) / 86400000;
  if (d < 0)  return {label:"Vencido",    color:"#ef4444", bg:"#fef2f2"};
  if (d < 1)  return {label:"Vence hoy",  color:"#f97316", bg:"#fff7ed"};
  if (d < 5)  return {label:"Por vencer", color:"#eab308", bg:"#fefce8"};
  return {label:"A tiempo", color:"#22c55e", bg:"#f0fdf4"};
}

function getAccionRequerida(r) {
  if (["completada","consolidada","vinculado_proyecto"].includes(r.estadoAvance)) return null;
  const crit = r.criticidad || r.pri || "media";
  const plazoDias = {urgente:1,alta:2,media:3,baja:5}[crit] || 3;
  const diasCreado = (new Date() - new Date(r.createdAt)) / 86400000;
  if (!r.ejecutorMail || r.ejecutorMail.trim() === "") {
    if (diasCreado > plazoDias) return {label:"⚠️ Fuera de plazo — acción urgente", color:"#dc2626", bg:"#fef2f2"};
    if (crit === "urgente") return {label:"🔴 Urgente — asignar ahora", color:"#dc2626", bg:"#fef2f2"};
    return null; // "Pend. asignación" ya lo muestra el badge de estado
  }
  if (r.ejecutorRechazado) return {label:"❌ Reasignar ejecutor", color:"#dc2626", bg:"#fef2f2"};
  // "Esperando confirmación" ya lo muestra el badge — no repetir
  if (r.estadoAvance === "esperando_validacion") return {label:"Esperando validacion directivo", color:"#6d28d9", bg:"#f5f3ff"};
  if (r.estadoAvance === "sin_resolucion") return {label:"Sin resolucion — en seguimiento", color:"#d97706", bg:"#fffbeb"};
  return null;
}

function getEstadoEjecucion(r) {
  // No hay fecha de inicio → no mostrar nada
  if (!r.fechaInicioEsperado && !r.fechaInicioOriginal) return null;

  const ahora = new Date(); ahora.setHours(0,0,0,0);
  const inicio = pld(r.fechaInicioEsperado || r.fechaInicioOriginal);
  inicio.setHours(0,0,0,0);
  const cierreStr = r.fechaOriginalCierre || r.fechaCierre;
  const cierre = cierreStr ? pld(cierreStr) : null;
  if (cierre) cierre.setHours(0,0,0,0);

  // Esperando validacion directivo
  if (r.estadoAvance === "esperando_validacion")
    return { label: "Esperando validacion directivo", color: "#6d28d9", bg: "#f5f3ff" };

  // Completada
  if (r.estadoAvance === "completada")
    return { label: "Completada", color: "#15803d", bg: "#f0fdf4" };

  const lista = r.ejecutores_lista || [];
  const tieneEjecutor = lista.length > 0 ? true : !!(r.ejecutorMail?.trim());
  const todosRechazaron = lista.length > 0
    ? lista.every(ej => ej.rechazado === true)
    : !!r.ejecutorRechazado;
  const alguienConfirmo = lista.length > 0
    ? lista.some(ej => ej.confirmado === true && !ej.rechazado)
    : !!r.ejecutorConfirmado;

  const fechaActiva = ahora >= inicio;
  const demorada = cierre && ahora > cierre;

  const prefix = r.reabierta ? "↩️ Reabierta — " : "";

  if (fechaActiva || demorada) {
    if (!tieneEjecutor)
      return { label: prefix+"🚨 Sin asignar", color: "#dc2626", bg: "#fef2f2" };
    if (todosRechazaron)
      return { label: prefix+"🚨 Sin ejecutor activo", color: "#dc2626", bg: "#fef2f2" };
    if (!alguienConfirmo)
      return demorada

async function sbUploadFile(file, path) {
  try {
    // Convert base64 to blob
    const res = await fetch(file.data);
    const blob = await res.blob();
    const uploadRes = await fetch(
      `${SUPABASE_URL}/storage/v1/object/reclamos-adjuntos/${path}`,
      {
        method: "POST",
        headers: {
          "apikey": SUPABASE_KEY,
          "Authorization": "Bearer "+SUPABASE_KEY,
          "Content-Type": file.tipo||"application/octet-stream",
          "x-upsert": "true",
        },
        body: blob,
      }
    );
    if (uploadRes.ok) {
      const publicUrl = `${SUPABASE_URL}/storage/v1/object/public/reclamos-adjuntos/${path}`;
      console.log("Uploaded:", publicUrl);
      return publicUrl;
    } else {
      const err = await uploadRes.text();
      console.error("Upload error:", err);
      return null;
    }
  } catch(e) { console.error("Upload exception:", e); return null; }
}

async function uploadAdjuntos(adjuntos, reclamoId, prefijo) {
  const urls = [];
  for (const [i, adj] of adjuntos.entries()) {
    if (!adj.data) { urls.push({nombre:adj.nombre,url:adj.url||null,tipo:adj.tipo}); continue; }
    const ext = adj.nombre.split('.').pop()||"jpg";
    const path = `${prefijo}/${reclamoId}/${i}-${Date.now()}.${ext}`;
    const url = await sbUploadFile(adj, path);
    urls.push({nombre:adj.nombre, url, tipo:adj.tipo});
  }
  return urls;
}

function buildAdjuntosHTML(adjuntos, titulo) {
  if (!adjuntos || !adjuntos.length) return '';
  const items = adjuntos.filter(a => a.url);
  if (!items.length) return '';
  const imgs = items.filter(a => a.tipo && a.tipo.startsWith('image/'));
  const videos = items.filter(a => a.tipo && a.tipo.startsWith('video/'));
  const otros = items.filter(a => !a.tipo || (!a.tipo.startsWith('image/') && !a.tipo.startsWith('video/')));
  let html = `<div style="margin-top:12px;margin-bottom:8px">
    <div style="font-size:11px;color:#64748b;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">${titulo}</div>`;
  if (imgs.length) {
    html += '<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px">';
    imgs.forEach(a => {
      html += `<a href="${a.url}" target="_blank" style="display:inline-block;border-radius:8px;overflow:hidden;border:1px solid #e2e8f0">
        <img src="${a.url}" style="width:120px;height:90px;object-fit:cover;display:block" alt="${a.nombre||'foto'}" />
      </a>`;
    });
    html += '</div>';
  }
  if (videos.length || otros.length) {
    [...videos, ...otros].forEach(a => {

// ── DUPLICATE DETECTION ──────────────────────────────────────────────────────
const STOPWORDS = new Set(["que","los","las","del","una","hay","por","con","muy","esta","esto","estan","para","como","mas","sin","son","sus","fue","ser","han","pero","bien","mal","hay","tiene","hay","ahi","aca","solo","todo","toda","todos"]);

function tokenizar(texto) {
  return (texto||"").toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/[^a-z0-9\s]/g,"")
    .split(/\s+/)
    .filter(w => w.length > 2 && !STOPWORDS.has(w));
}

function similitudJaccard(a, b) {
  const setA = new Set(tokenizar(a));
  const setB = new Set(tokenizar(b));
  if(!setA.size || !setB.size) return 0;
  const interseccion = [...setA].filter(x => setB.has(x)).length;
  const union = new Set([...setA, ...setB]).size;
  return interseccion / union;
}

// Sinónimos del dominio del club para mejorar detección semántica
const SINONIMOS = [
  ["sucio","sucia","sucios","sucias","limpieza","limpiar","higiene","olor","viciado","olores","hedor","peste"],
  ["roto","rota","rotos","rotas","rompió","rompio","quebrado","quebrada","daño","dano","daños","danos","deteriorado","deteriorada"],
  ["gotea","gotera","pérdida","perdida","perdidas","filtración","filtracion","humedad","mojado","mojada","agua"],
  ["oscuro","oscura","luz","luces","iluminación","iluminacion","foco","focos","fundido","fundida","apagado","apagada"],
  ["frío","frio","calor","temperatura","climatización","climatizacion","aire","ventilación","ventilacion","calefacción","calefaccion"],
  ["atascado","atascada","tapado","tapada","cañería","caneria","desagüe","desague","cloaca"],
  ["pintura","pared","paredes","humedad","manchas","mancha","descascarado","descascarada"],
];

function expandirTokens(tokens) {
  const expandidos = new Set(tokens);
  for(const tok of tokens) {
    for(const grupo of SINONIMOS) {
      if(grupo.includes(tok)) {
        grupo.forEach(s => expandidos.add(s));
        break;
      }
    }
  }
  return expandidos;
}

function similitudSemantica(a, b) {
  const tokA = tokenizar(a);
  const tokB = tokenizar(b);
  const setA = expandirTokens(tokA);
  const setB = expandirTokens(tokB);
  if(!setA.size || !setB.size) return 0;
  const interseccion = [...setA].filter(x => setB.has(x)).length;
  const union = new Set([...setA, ...setB]).size;
  return interseccion / union;
}

async function detectarDuplicados(nuevoRec, todosRecs) {
  const candidatos = todosRecs.filter(r =>
    r.id !== nuevoRec.id &&
    !r.esRecurrente &&  // excluir tickets recurrentes
    !["completada","consolidada","vinculado_proyecto"].includes(r.estadoAvance) &&
    r.desc && r.desc.trim().length > 3
  );
  if(!candidatos.length) return [];

  const UMBRAL = 0.20;
  const similares = [];

  for(const r of candidatos) {
    const scoreDesc = similitudSemantica(nuevoRec.desc, r.desc);
    const sectorCoincide = nuevoRec.sector === r.sector;
    const scoreFinal = scoreDesc * 0.8 + (sectorCoincide ? 0.2 : 0);
    console.log(`Dup check ${nuevoRec.numero} vs ${r.numero}: desc=${scoreDesc.toFixed(2)} sector=${sectorCoincide} final=${scoreFinal.toFixed(2)}`);
    if(scoreFinal >= UMBRAL) {
      similares.push({
        numero: r.numero,
        similitud: "alta",
        razon: `Descripción similar (${(scoreDesc*100).toFixed(0)}% coincidencia)${sectorCoincide?" · mismo sector":""}`,
        descExistente: r.desc,
        sectorCoincide,
        _score: scoreFinal
      });
    }
  }
  return similares.sort((a,b) => b._score - a._score);
}

          h('textarea',{value:f.desc,onChange:e=>set("desc",e.target.value),rows:4,placeholder:"Describí el problema con el mayor detalle posible...",style:{...iS(err.desc),resize:"vertical"}})),
        h('div',{style:{marginBottom:14}},lbl("Ubicación exacta (opcional)"),
          h('input',{value:f.ubicacion,onChange:e=>set("ubicacion",e.target.value),placeholder:"Ej: Vestuario masculino, canilla del fondo",style:iS(false)})),
        // Adjuntos
        h('div',{style:{marginBottom:22}},lbl("Foto / video del problema"),
          h('input',{ref:fileRef,type:"file",accept:"image/*,video/*",multiple:true,style:{display:"none"},onChange:e=>{Array.from(e.target.files).forEach(file=>{const r=new FileReader();r.onload=ev=>setF(p=>({...p,adjuntos:[...p.adjuntos,{nombre:file.name,tipo:file.type,data:ev.target.result}]}));r.readAsDataURL(file);});e.target.value="";},capture:"environment"}),
          h('div',{style:{display:"flex",gap:8,flexWrap:"wrap",marginBottom:f.adjuntos.length?8:0}},
            ...f.adjuntos.map((a,i)=>h('div',{key:i,style:{display:"flex",alignItems:"center",gap:6,background:"rgba(255,255,255,0.1)",borderRadius:8,padding:"5px 10px",fontSize:12}},
              h('span',null,a.tipo?.startsWith("video")?"🎥":"📷"),
              a.url ? h('a',{href:a.url,target:"_blank",style:{color:"#93c5fd",maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontSize:12}},a.nombre)
                    : h('span',{style:{color:"white",maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},a.nombre),
              h('button',{onClick:()=>setF(p=>({...p,adjuntos:p.adjuntos.filter((_,idx)=>idx!==i)})),style:{background:"none",border:"none",cursor:"pointer",color:"#ef4444",fontSize:14,padding:0}},"✕")))),
          h('button',{onClick:()=>fileRef.current.click(),style:{padding:"9px 16px",borderRadius:9,border:"1.5px dashed rgba(255,255,255,0.25)",background:"transparent",color:"#94a3b8",cursor:"pointer",fontSize:13}},"📎 Adjuntar foto / video")),
        // Submit
        h('button',{onClick:submit,disabled:sending,style:{width:"100%",padding:"15px",background:sending?"#475569":"linear-gradient(135deg,#3b82f6,#1d4ed8)",color:"white",border:"none",borderRadius:12,fontSize:16,fontWeight:700,cursor:sending?"not-allowed":"pointer"}},sending?"Enviando...":"Enviar Solicitud →"))));
}

// ── PANTALLA RECHAZO ───────────────────────────────────────────────────────
function PantallaRechazo({onConfirm}) {
  const [motivo,setMotivo] = useState("");
  const [err,setErr] = useState(false);
  const pending = ls.get("pendingRechazar");
  const rec = pending?.rec;
  const submit = () => { if(!motivo.trim()){setErr(true);return;} onConfirm(motivo.trim()); };
  return h('div',{style:{minHeight:"100vh",background:"linear-gradient(135deg,#0f172a,#1e3a5f)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}},
    h('div',{style:{background:"white",borderRadius:20,padding:36,maxWidth:460,width:"100%",boxShadow:"0 20px 60px rgba(0,0,0,.3)"}},
      h('div',{style:{fontSize:48,textAlign:"center",marginBottom:12}},"Error"),
      h('h2',{style:{fontFamily:"'Playfair Display',serif",fontSize:24,color:"#0f172a",margin:"0 0 8px",textAlign:"center"}},"Rechazar tarea"),
      rec && h('div',{style:{background:"#f8fafc",borderRadius:12,padding:14,marginBottom:20,fontSize:13}},
        h('div',{style:{fontWeight:600,color:"#1e293b",marginBottom:4}},rec.numero+" — "+rec.sector),
        h('div',{style:{color:"#64748b"}},rec.desc)),
      h('div',{style:{marginBottom:20}},
        h('label',{style:{display:"block",fontSize:12,fontWeight:600,color:err?"#ef4444":"#374151",marginBottom:8,textTransform:"uppercase",letterSpacing:0.5}},"Motivo del rechazo *"),
        h('textarea',{value:motivo,onChange:e=>{setMotivo(e.target.value);setErr(false);},rows:4,placeholder:"Explicá por qué no podés asumir esta tarea...",style:{width:"100%",padding:"12px 14px",borderRadius:10,border:err?"2px solid #ef4444":"1.5px solid #e2e8f0",fontSize:14,resize:"vertical",outline:"none",boxSizing:"border-box"}}),
        err && h('div',{style:{color:"#ef4444",fontSize:12,marginTop:4}},"El motivo es obligatorio")),
      h('button',{onClick:submit,style:{width:"100%",padding:"14px",background:"linear-gradient(135deg,#ef4444,#dc2626)",color:"white",border:"none",borderRadius:12,fontSize:15,fontWeight:700,cursor:"pointer"}},"Confirmar rechazo")));
}

// ── MODAL GESTIÓN ──────────────────────────────────────────────────────────
function EditModal({rec, onClose, onSave, ejecutores, onUpdateHijo, recs}) {
  const [tab,setTab] = useState("gestion");
  const yaFueAsignado = !!(rec.ejecutorMailOriginal || rec.fechaInicioOriginal);
  const [f,setF] = useState({
    estadoAvance:rec.estadoAvance||"bajo_analisis", criticidad:rec.criticidad||"",
    fechaInicioEsperado:rec.fechaInicioEsperado||"", fechaCierre:rec.fechaCierre||"",
    ejecutorMail:rec.ejecutorMail||"", ejecutorNombre:rec.ejecutorNombre||"",
    tipoEjecutor:rec.tipoEjecutor||"interno", empresaNombre:rec.empresaNombre||"", empresaTelefono:rec.empresaTelefono||"",
    ejecutores_lista:rec.ejecutores_lista||[],
    presupuesto:rec.presupuesto||"", presupuestoDetalle:rec.presupuestoDetalle||"",
    descripcionResolucion:rec.descripcionResolucion||"", evidenciaUrl:rec.evidenciaUrl||"",
    nuevoComentario:"",
    // Campos de actualización de fecha (cuando ya fue asignado)
    fechaInicioActualizada:rec.fechaInicioActualizada||"",
    horaInicio:rec.horaInicio||"", horaFin:rec.horaFin||"",
    fechaCierreActualizada:rec.fechaCierreActualizada||"",
    motivoActualizacion:rec.motivoActualizacion||"",
    adjuntosResolucion:rec.adjuntosResolucion||[],
    reclamoPadre:rec.reclamoPadre||"",
    reclamosHijos:rec.reclamosHijos||[],
    proyectoVinculadoId:rec.proyectoVinculadoId||null,
    proyectoTitulo:rec.proyectoTitulo||"",
    justificacionDemora:rec.justificacionDemora||"",
  });
  const [saveErr,setSaveErr] = useState("");
  const [sending,setSending] = useState(false);
  const fileRef = useRef();
  const set = (k,v) => setF(p=>({...p,[k]:v}));
  const cat = CATS[rec.cat]; const pri = PRIS.find(p=>p.id===rec.pri); const t = getTiming(rec);
  const aS = () => ({width:"100%",padding:"10px 14px",borderRadius:8,border:"1.5px solid #e2e8f0",fontSize:14,outline:"none",boxSizing:"border-box"});

  const selectEj = mail => { const ej=ejecutores.find(e=>e.mail===mail); set("ejecutorMail",mail); if(ej) set("ejecutorNombre",ej.nombre); };

  const save = async () => {
    if(sending) return; // guard doble-click
    setSaveErr("");
    // Block completada without resolution description
    if(f.estadoAvance==="completada" && !f.descripcionResolucion.trim()) {
      setSaveErr("Para marcar como completada debés describir qué se hizo en la tab Resolución.");
      setTab("resolucion");
      return;
    }
    // Skip executor/date validation when linked to a project OR when consolidating
    const isVinculado = f.estadoAvance==="vinculado_proyecto" || f.proyectoVinculadoId;
    const isConsolidando = (f.reclamosHijos||[]).length > 0 || (rec.reclamosHijos||[]).length > 0 || f.estadoAvance==="consolidada";
    const isSinResolucion = f.estadoAvance==="sin_resolucion";
    if(!isVinculado && !isConsolidando && !isSinResolucion) {
      if(!f.ejecutorMail && f.estadoAvance !== "sin_resolucion") { setSaveErr("Debés asignar un ejecutor antes de guardar."); return; }
      if(f.ejecutorMail && !f.nuevoComentario.trim() && !rec.comentarios?.some(c=>c.autor==="Intendencia")) { setSaveErr("El comentario para el ejecutor es obligatorio."); setTab("asignacion"); return; }
      if(f.estadoAvance !== "sin_resolucion") {
        if(!f.fechaInicioEsperado && !rec.fechaInicioOriginal) { setSaveErr("La fecha de inicio es obligatoria."); return; }
        if(!f.fechaCierre && !rec.fechaOriginalCierre) { setSaveErr("La fecha de cierre es obligatoria."); return; }
      }
      // Block save if fechaCierre is in the past without updated date (unless completada)
      if(f.estadoAvance !== "completada") {
        const fechaEfectiva = f.fechaCierreActualizada || f.fechaCierre || rec.fechaOriginalCierre;
        if(fechaEfectiva && pld(fechaEfectiva) < new Date() && !f.fechaCierreActualizada && !f.motivoActualizacion?.trim()) {
          setSaveErr("La fecha de cierre está vencida. Debés ingresar una nueva fecha y el motivo del cambio.");
          setTab("gestion");
          return;
        }
        if(f.fechaCierreActualizada && !f.motivoActualizacion?.trim()) {
          setSaveErr("Si actualizás la fecha de cierre, el motivo es obligatorio.");
          setTab("gestion");
          return;
        }
      }
      if(!f.criticidad) { setSaveErr("Debés asignar una criticidad."); return; }
    }
    // Validar justificación de demora: obligatoria si sin_resolucion O fecha cierre >21 días desde creación
    const diasDesdeCreacion = rec.createdAt ? (pld(f.fechaCierre||"") - new Date(rec.createdAt)) / 86400000 : 0;
    const esSinResolucion = f.estadoAvance === "sin_resolucion";
    const esDemoraLarga = !!(f.fechaCierre && diasDesdeCreacion > 21);
    const requiereJustificacion = (esSinResolucion || esDemoraLarga) && !isVinculado && !isConsolidando;
    if(requiereJustificacion && !f.justificacionDemora?.trim()) {
      setSaveErr(esSinResolucion
        ? "Debés explicar el motivo por el cual no se puede resolver en este momento."
        : "La fecha de cierre supera los 21 días desde la creación. Debés justificar el motivo.");
      setTab("gestion");
      return;
    }
    setSending(true);
    const comentarios=[...(rec.comentarios||[])];
    if(f.nuevoComentario.trim()) comentarios.push({texto:f.nuevoComentario.trim(),fecha:new Date().toISOString(),autor:"Intendencia"});

    // Lock original dates on first save
    const fechaInicioOriginal = rec.fechaInicioOriginal || f.fechaInicioEsperado;
    const fechaOriginalCierre = rec.fechaOriginalCierre || f.fechaCierre;
    const ejecutorMailOriginal = rec.ejecutorMailOriginal || (f.ejecutorMail !== rec.ejecutorMail ? f.ejecutorMail : rec.ejecutorMailOriginal);

    const fechaAsignacion = (f.ejecutorMail && f.ejecutorMail!==rec.ejecutorMail) ? new Date().toISOString() : rec.fechaAsignacion;
    // Only send emails to executors that are NEWLY added — deduplicated
    const ejsNuevosRaw = (f.ejecutores_lista||[]).filter(ej=>
      ej.mail && !ej.mail.includes("externo") &&
      !(rec.ejecutores_lista||[]).find(x=>x.mail===ej.mail)
    );
    const ejsNuevos = ejsNuevosRaw.filter((ej,i,arr)=>arr.findIndex(x=>x.mail===ej.mail)===i);
    if(ejsNuevos.length > 0){
      const appUrl=window.location.href.split("?")[0];
      const catRespMails=(getCatCfg(rec.cat).responsables||[]).map(x=>x.mail);
      const todosLosMailsEjs = ejsNuevos.map(e=>e.mail);
      for(const ejCurrent of ejsNuevos) {
        // CC: only category responsables, NEVER any executor (avoids duplicate mails)
        const cc = catRespMails.filter(e => e && !todosLosMailsEjs.includes(e));
        const isSameDay = f.fechaInicioEsperado && f.fechaCierre && f.fechaInicioEsperado===f.fechaCierre;
        const calLink = buildGCalLink({
          titulo: `Tarea ${rec.sector} — ${rec.numero}`,
          desc: `Tarea: ${cat?.label} > ${rec.sub}\nDescripcion: ${rec.desc}\nNumero: ${rec.numero}\nCompletar: ${appUrl}?completar=${rec.id}`,
          fechaInicio: f.fechaInicioEsperado,
          fechaFin: f.fechaCierre,
          horaInicio: isSameDay ? f.horaInicio : null,
          horaFin: isSameDay ? f.horaFin : null,
        });
        const calReminderLink = buildGCalReminderLink({
          titulo: `Confirmar resolución — ${rec.numero}`,
          desc: `Confirmar que la tarea ${rec.numero} fue completada:\n${appUrl}?completar=${rec.id}`,
          fechaFin: f.fechaCierre||f.fechaInicioEsperado,
        });
        const fotosSolicitud = (rec.adjuntos||[]).filter(a=>a.url);
        const fotosHtml = fotosSolicitud.length > 0
          ? `<div style="margin-top:12px"><div style="font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">Fotos del problema</div><div>${fotosSolicitud.map(a=>`<a href="${a.url}" target="_blank"><img src="${a.url}" style="width:80px;height:80px;object-fit:cover;border-radius:8px;border:1px solid #e2e8f0;margin-right:6px"></a>`).join('')}</div></div>`
          : '';
        const comentarioHtml = f.nuevoComentario?.trim()
          ? `<div style="background:#fffbeb;border-left:4px solid #f59e0b;padding:10px 14px;border-radius:0 8px 8px 0;margin-bottom:14px"><div style="font-size:11px;font-weight:700;color:#92400e;margin-bottom:4px;text-transform:uppercase">Instrucciones del responsable</div><div style="color:#78350f;font-size:13px">${f.nuevoComentario.trim()}</div></div>`
          : '';
        const horaInfo = (isSameDay && f.horaInicio) ? `<tr><td style="padding:4px 0;color:#64748b;width:120px">Horario:</td><td style="font-weight:600">${f.horaInicio}${f.horaFin?' a '+f.horaFin:''}</td></tr>` : '';
        const calendarUrl = `${appUrl}?calendar=${rec.id}&mail=${encodeURIComponent(ejCurrent.mail)}`;
        const confirmarUrl = `${appUrl}?confirmar=${rec.id}&mail=${encodeURIComponent(ejCurrent.mail)}`;
        const rechazarUrl  = `${appUrl}?rechazar=${rec.id}&mail=${encodeURIComponent(ejCurrent.mail)}`;
        const otrosEjs = ejsNuevos.filter(e=>e.mail!==ejCurrent.mail).map(e=>e.nombre);
        const saludoNombres = otrosEjs.length > 0
          ? `${ejCurrent.nombre} y ${otrosEjs.join(" y ")}`
          : ejCurrent.nombre;
        const ejHtml = `<div style="font-family:Arial,sans-serif;max-width:600px;margin:0 auto;background:#f8fafc;padding:20px">
          <div style="background:#0f172a;padding:20px 24px;border-radius:12px 12px 0 0">
            <div style="color:#93c5fd;font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px">Asturiano — Sistema de Reclamos</div>
            <div style="color:white;font-size:20px;font-weight:700">Tarea asignada — ${rec.numero}</div>
          </div>
          <div style="background:white;padding:24px;border-radius:0 0 12px 12px;border:1px solid #e2e8f0">
            <p style="color:#475569;font-size:15px;margin:0 0 16px">Hola <strong>${saludoNombres}</strong>, se les asign&oacute; la siguiente tarea:</p>
            ${comentarioHtml}
            <div style="background:#f8fafc;border-radius:8px;padding:14px;margin-bottom:20px">
              <table style="width:100%;font-size:13px">
                <tr><td style="padding:4px 0;color:#64748b;width:120px">Numero:</td><td style="font-weight:700;font-family:monospace;color:#3b82f6">${rec.numero}</td></tr>
                <tr><td style="padding:4px 0;color:#64748b">Sector:</td><td style="font-weight:600">${rec.sector}</td></tr>
                <tr><td style="padding:4px 0;color:#64748b">Tipo:</td><td>${cat?.label} &rsaquo; ${rec.sub}</td></tr>
                <tr><td style="padding:4px 0;color:#64748b">Descripcion:</td><td>${rec.desc}</td></tr>
                <tr><td style="padding:4px 0;color:#64748b">Fecha inicio:</td><td style="font-weight:600">${fd(f.fechaInicioEsperado||'')}</td></tr>
                <tr><td style="padding:4px 0;color:#64748b">Fecha cierre:</td><td style="font-weight:600">${fd(f.fechaCierre)}</td></tr>
                ${horaInfo}
              </table>
              ${fotosHtml}
            </div>
            <div style="font-size:13px;font-weight:700;color:#0f172a;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.5px">&#10102; Confirm&aacute; o rechaz&aacute; la tarea</div>
            <table style="width:100%;margin-bottom:20px"><tr>
              <td style="padding-right:6px"><a href="${confirmarUrl}" style="display:block;padding:13px 10px;background:#22c55e;color:white;text-decoration:none;border-radius:8px;font-weight:700;font-size:14px;text-align:center">&#10003; Confirmar tarea</a></td>
              <td style="padding-left:6px"><a href="${rechazarUrl}" style="display:block;padding:13px 10px;background:#ef4444;color:white;text-decoration:none;border-radius:8px;font-weight:700;font-size:14px;text-align:center">&#10007; Rechazar tarea</a></td>
            </tr></table>
            <div style="padding:10px 14px;background:#f0fdf4;border-radius:8px;font-size:12px;color:#15803d">
              &#10003; Cuando completes la tarea: <a href="${appUrl}?completar=${rec.id}" style="color:#15803d;font-weight:700">Marcar como completada</a>
            </div>
          </div>
          <div style="text-align:center;color:#94a3b8;font-size:11px;margin-top:12px">Asturiano — Sistema de Reclamos</div>
        </div>`;
        const ejBodyPlain = `Hola ${saludoNombres},\n\nSe les asignó la siguiente tarea:\n\nNumero: ${rec.numero}\nSector: ${rec.sector}\nProblema: ${cat?.label} > ${rec.sub}\nDescripcion: ${rec.desc}\nFecha inicio: ${fd(f.fechaInicioEsperado||'')}\nFecha cierre: ${fd(f.fechaCierre)}\n\n1. CONFIRMAR: ${confirmarUrl}\n   RECHAZAR: ${rechazarUrl}\n\n2. Cuando completes: ${appUrl}?completar=${rec.id}`;
        await sendEmail({to:ejCurrent.mail, cc, subject:`[Asturiano] Tarea asignada — ${rec.numero}: ${rec.sector}`, htmlBody:ejHtml, body:ejBodyPlain});
      }
    }
    const fechaCierreConfirmada = f.fechaCierre ? f.fechaCierre : rec.fechaCierreConfirmada||null;
    // Upload new adjuntosResolucion that still have base64 data
    let adjuntosResolucion = f.adjuntosResolucion || [];
    const newAdjuntos = adjuntosResolucion.filter(a=>a.data);
    if(newAdjuntos.length > 0) {
      const uploaded = await uploadAdjuntos(adjuntosResolucion, rec.id, "resolucion");
      adjuntosResolucion = uploaded;
    }
    // Auto-calculate estado based on dates and assignment
    const calcEstado = () => {
      // Don't auto-change if already in terminal/special states
      if(["completada","consolidada","esperando_validacion","vinculado_proyecto","sin_resolucion"].includes(f.estadoAvance)) return f.estadoAvance;
      const ahora = new Date();
      const fechaInicio = pld(f.fechaInicioEsperado||f.fechaInicioActualizada||"");
      const fechaCierreEfectiva = pld(f.fechaCierreActualizada||f.fechaCierre||"");
      // No executor assigned yet
      if(!f.ejecutorMail || f.ejecutorMail.trim()==="") return "bajo_analisis";
      // Has executor but no dates
      if(!f.fechaInicioEsperado && !f.fechaCierre) return "sin_resolucion";
      // Overdue
      if(f.fechaCierre && fechaCierreEfectiva < ahora) return "demorada";
      // In progress (start date passed, not yet done)
      if(f.fechaInicioEsperado && fechaInicio <= ahora) return "iniciada";
      // Planned (start date in future)
      if(f.fechaInicioEsperado && fechaInicio > ahora) return "no_iniciada";
      return f.estadoAvance || "bajo_analisis";
    };
    const autoEstado = calcEstado();
    let savedRec = {...rec,...f,adjuntosResolucion,comentarios,nuevoComentario:undefined,
      estadoAvance: autoEstado,
      reabierta: rec.reabierta || false,
      fechaCierreConfirmada,fechaInicioOriginal,fechaOriginalCierre,ejecutorMailOriginal,fechaAsignacion,
      updatedAt:new Date().toISOString()};
    await onSave(savedRec);
    // Consolidación manual: autopopular datos del padre en cada hijo nuevo
    const hijosAnteriores = new Set(rec.reclamosHijos||[]);
    const hijosNuevos = (f.reclamosHijos||[]).filter(num => !hijosAnteriores.has(num));
    if(hijosNuevos.length > 0) {
      const appUrl = window.location.href.split("?")[0];
      for(const num of hijosNuevos) {
        const hijoRec = (recs||[]).find(r=>r.numero===num);
        if(!hijoRec) continue;
        // Determinar quién es el padre real: el ticket con más info de gestión
        const esPadre = !!(savedRec.ejecutorMail || savedRec.fechaCierreConfirmada);
        const padre = esPadre ? savedRec : hijoRec;
        const hijo = esPadre ? hijoRec : savedRec;
        const hijoUpd = {...hijo,
          estadoAvance: "consolidada",
          reclamoPadre: padre.numero,
          ejecutorMail: padre.ejecutorMail||"",
          ejecutorNombre: padre.ejecutorNombre||"",
          ejecutorConfirmado: padre.ejecutorConfirmado||false,
          ejecutores_lista: padre.ejecutores_lista||[],
          fechaInicioEsperado: padre.fechaInicioEsperado||"",
          fechaCierre: padre.fechaCierre||"",
          fechaCierreConfirmada: padre.fechaCierreConfirmada||"",
          criticidad: padre.criticidad||hijo.criticidad,
          descripcionResolucion: padre.descripcionResolucion||"",
          posiblesDuplicados: [],
          comentarios:[...(hijo.comentarios||[]),{texto:`Consolidada como sub-ticket de ${padre.numero}. Será resuelta en conjunto.`,fecha:new Date().toISOString(),autor:"Sistema"}]
        };
        // Si el padre es el ticket actual, actualizar padre con reclamosHijos correcto
        if(!esPadre) {
          const padreUpd = {...hijoRec,
            reclamosHijos:[...new Set([...(hijoRec.reclamosHijos||[]), savedRec.numero])],
            comentarios:[...(hijoRec.comentarios||[]),{texto:`Sub-ticket ${savedRec.numero} consolidado bajo esta solicitud.`,fecha:new Date().toISOString(),autor:"Sistema"}]
          };
          await sbUpsert(padreUpd);
          if(onUpdateHijo) await onUpdateHijo(padreUpd);
        }
        await sbUpsert(hijoUpd);
        if(onUpdateHijo) await onUpdateHijo(hijoUpd);
        if(hijo.email) await sendEmail({to:hijo.email,
          subject:`[Asturiano] Tu solicitud fue consolidada — ${hijo.numero}`,

// ── MODAL DUPLICADO ────────────────────────────────────────────────────────
function ModalConsolidacion({hijo, candidatos, onClose, onConsolidar, onDescartar}) {
  // seleccionados: Set de numeros seleccionados (candidatos + opcionalmente el hijo)
  const [seleccionados, setSeleccionados] = useState(new Set());
  const [confirmando, setConfirmando] = useState(false);
  const labelStyle = {fontSize:10,fontWeight:700,color:"#94a3b8",textTransform:"uppercase",letterSpacing:0.5,marginBottom:4};
  const valStyle = {fontSize:13,color:"#1e293b",lineHeight:1.5};

  const toggle = (numero) => {
    setSeleccionados(prev => {
      const next = new Set(prev);
      if(next.has(numero)) next.delete(numero); else next.add(numero);
      return next;
    });
  };

  const consolidar = async () => {
    if(seleccionados.size === 0) return;
    setConfirmando(true);
    // Candidatos seleccionados (sin el hijo) ordenados por fecha = el más antiguo es el padre
    const selCandidatos = candidatos.filter(c => seleccionados.has(c.numero));
    const hijoSeleccionado = seleccionados.has(hijo.numero);
    // Padre = el más antiguo entre los candidatos seleccionados
    const padre = selCandidatos[0];
    // Hijos = resto de candidatos seleccionados + ticket nuevo si fue seleccionado
    const hijos = [...selCandidatos.slice(1), ...(hijoSeleccionado ? [hijo] : [])];
    await onConsolidar(padre, hijos);
    setConfirmando(false);
  };

  // Todos los tickets a mostrar: candidatos (izq→der, más antiguo primero) + hijo al final
  const todos = [...candidatos, hijo];

  // Padre natural del grupo seleccionado (más antiguo candidato seleccionado)
  const padreNatural = candidatos.find(c => seleccionados.has(c.numero));

  return h('div',{style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",display:"flex",alignItems:"flex-start",justifyContent:"center",zIndex:2000,padding:"20px 12px",overflowY:"auto"}},
    h('div',{style:{background:"white",borderRadius:20,width:"100%",maxWidth:Math.min(280*todos.length+60, window.innerWidth-24),marginBottom:20}},
      h('div',{style:{background:"#854d0e",padding:"16px 22px",borderRadius:"20px 20px 0 0",display:"flex",justifyContent:"space-between",alignItems:"center"}},
        h('div',null,
          h('div',{style:{fontSize:11,color:"#fde68a",letterSpacing:2,textTransform:"uppercase",marginBottom:2}},"Posibles duplicados detectados"),
          h('div',{style:{color:"white",fontSize:17,fontWeight:700}},"Seleccioná los que son el mismo problema")),
        h('button',{onClick:onClose,style:{background:"none",border:"none",color:"rgba(255,255,255,0.7)",fontSize:22,cursor:"pointer"}},"✕")),
      h('div',{style:{padding:"20px 22px"}},
        // Instrucciones
        h('div',{style:{background:"#fef9c3",border:"1.5px solid #fde047",borderRadius:10,padding:"10px 14px",marginBottom:16,fontSize:13,color:"#713f12"}},
          h('div',{style:{fontWeight:700,marginBottom:4}},"📋 Cómo usar este panel:"),
          h('div',null,"• Hacé click en los tickets que creés que son el mismo problema para seleccionarlos."),
          h('div',null,"• El más antiguo seleccionado (entre los candidatos) se vuelve padre automáticamente."),
          h('div',null,"• El ticket nuevo (derecha) es opcional — si lo seleccionás también se consolida, si no lo dejás independiente."),
          h('div',null,"• Podés consolidar solo candidatos entre sí sin incluir el ticket nuevo.")),
        // Cards
        h('div',{style:{display:"flex",gap:12,overflowX:"auto",marginBottom:16,paddingBottom:4}},
          ...todos.map((r, idx) => {
            const esNuevo = r.id === hijo.id;
            const esPadreNatural = !esNuevo && seleccionados.size > 0 && candidatos.findIndex(c=>seleccionados.has(c.numero)) === idx;
            const selec = seleccionados.has(r.numero);
            const cat = CATS[r.cat];
            const borderColor = selec ? (esPadreNatural ? "#3b82f6" : "#22c55e") : esNuevo ? "#fde68a" : "#e2e8f0";
            const bgColor = selec ? (esPadreNatural ? "#eff6ff" : "#f0fdf4") : esNuevo ? "#fffbeb" : "#f8fafc";
            return h('div',{key:r.id,
              onClick: ()=>toggle(r.numero),
              style:{minWidth:240,flex:"0 0 240px",background:bgColor,borderRadius:12,padding:"14px 16px",border:"2.5px solid "+borderColor,cursor:"pointer",transition:"all 0.15s",position:"relative"}},
              h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}},
                h('div',null,
                  h('div',{style:{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,
                    color: esPadreNatural ? "#1d4ed8" : esNuevo ? "#854d0e" : selec ? "#166534" : "#94a3b8",marginBottom:3}},
                    esPadreNatural ? "👑 Padre (más antiguo)" : esNuevo ? "🆕 Ticket nuevo" : selec ? "✅ Hijo seleccionado" : "📋 Candidato — click para seleccionar"),
                  h('div',{style:{fontFamily:"monospace",fontSize:13,fontWeight:700,color:esPadreNatural?"#1d4ed8":esNuevo?"#92400e":"#475569"}},r.numero)),
                h('div',{style:{width:22,height:22,borderRadius:"50%",border:"2px solid "+(selec?(esPadreNatural?"#3b82f6":"#22c55e"):"#cbd5e1"),background:selec?(esPadreNatural?"#3b82f6":"#22c55e"):"white",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"white",flexShrink:0}},selec?"✓":"")),

function proximaOcurrenciaFrontend(rec, hoy) {
  const inicio = pld(rec.fechaInicio);
  inicio.setHours(0,0,0,0);
  const patron = rec.patron;
  const DIAS_SEM = (rec.diasSemana||[]);

  for (let d = 0; d <= 60; d++) {
    const fecha = new Date(hoy.getTime() + d * 86400000);
    fecha.setHours(0,0,0,0);
    if (fecha < inicio) continue;
    let esOcurrencia = false;
    if (patron === "diario") esOcurrencia = true;
    else if (patron === "semanal") esOcurrencia = DIAS_SEM.includes((fecha.getDay()+6)%7);
    else if (patron === "quincenal") esOcurrencia = Math.round((fecha-inicio)/86400000)%14===0;
    else if (patron === "mensual") esOcurrencia = fecha.getDate()===(rec.diaMes||1);
    else if (patron === "personalizado") esOcurrencia = Math.round((fecha-inicio)/86400000)%(rec.intervaloDias||7)===0;
    if (esOcurrencia) return fecha;
  }
  return null;
}

async function crearTicketDesdeRecurrencia(rec, fechaOcurrencia) {
  try {
    const fechaStr = fechaOcurrencia.toISOString().split('T')[0];
    const allRecs = await sbGetAll_reclamos();
    const PREFIX = {infraestructura:"I",mantenimiento:"M",limpieza:"L",preparacion:"P",servicios:"S",cuotas:"C"};
    const prefix = PREFIX[rec.cat]||"X";
    const catRecs = allRecs.filter(r=>r.cat===rec.cat);
    let maxNum = 0;
    catRecs.forEach(r=>{
      if(r.numero){const parts=r.numero.split("-");const n=parseInt(parts[parts.length-1],10);if(!isNaN(n)&&n>maxNum)maxNum=n;}
    });
    const seq = String(maxNum+1).padStart(3,"0");
    const yr = String(new Date().getFullYear()).slice(-2);
    const numero = `${prefix}-${yr}-REC-${seq}`;

function RecurrenciasTab({area, ejecutores, recs}) {
  const [lista, setLista] = useState([]);
  const [loading, setLoading] = useState(true);
  const [modal, setModal] = useState(null); // null | "nuevo" | recurrencia
  const [confirmDel, setConfirmDel] = useState(null);
  const cats = area==="administracion" ? CATS_ADMINISTRACION : CATS_INTENDENCIA;

  useEffect(()=>{ cargar(); },[]);

  const cargar = async () => {
    setLoading(true);
    const rows = await sbGetRecurrencias();
    // Filtrar solo las de esta área
    const filtradas = (rows||[]).map(r=>r.data).filter(r=>r && cats.includes(r.cat));
    setLista(filtradas);
    setLoading(false);
  };

  const guardar = async (rec) => {
    const esEdicion = rec.id && lista.some(r=>r.id===rec.id);
    await sbUpsertRecurrencia(rec);

    const hoy = new Date(); hoy.setHours(0,0,0,0);
    const allRecs = await sbGetAll_reclamos();

    if (rec.activa && rec.fechaInicio) {
      const fechaOcurrencia = proximaOcurrenciaFrontend(rec, hoy);
      if (fechaOcurrencia) {
        const diasFaltantes = Math.round((fechaOcurrencia - hoy) / 86400000);

        // Buscar ticket pendiente existente de esta recurrencia (el más próximo no resuelto)
        const estadosActivos = ["bajo_analisis","en_proceso","sin_resolucion","esperando_validacion"];
        const ticketsPendientes = allRecs
          .filter(r => r.recurrenciaId===rec.id && estadosActivos.includes(r.estadoAvance))
          .sort((a,b) => new Date(a.fechaInicioEsperado||a.createdAt) - new Date(b.fechaInicioEsperado||b.createdAt));
        const ticketPendiente = ticketsPendientes[0];

        if (esEdicion && ticketPendiente) {
          // Actualizar el ticket pendiente con los nuevos datos de la recurrencia
          const updatedTicket = {
            ...ticketPendiente,
            sector: rec.sector,
            cat: rec.cat,
            sub: rec.sub||rec.nombre,
            pri: rec.criticidad||"media",
            criticidad: rec.criticidad||"media",
            desc: rec.nombre+(rec.comentario?"\n\nInstrucciones: "+rec.comentario:""),
            ejecutorMail: rec.ejecutorMail||"",
            ejecutorNombre: rec.ejecutorNombre||"",
            nuevoComentario: rec.comentario||"",
            recurrenciaNombre: rec.nombre,
            updatedAt: new Date().toISOString()
          };
          await sbUpsert(updatedTicket);
        } else if (diasFaltantes <= (rec.leadTimeDias||0) && !ticketPendiente) {
          // No hay ticket pendiente y ya estamos en ventana → crear uno nuevo
          await crearTicketDesdeRecurrencia(rec, fechaOcurrencia);
        }
      }
    }
    await cargar();
    setModal(null);
  };

  const toggleActiva = async (rec) => {
    await sbUpsertRecurrencia({...rec, activa: !rec.activa});
    await cargar();
  };

  const eliminar = async (rec) => {
    await sbDeleteRecurrencia(rec.id);
    await cargar();
    setConfirmDel(null);
  };

  const PATRON_LABEL = {diario:"Diario",semanal:"Semanal",quincenal:"Quincenal",mensual:"Mensual",personalizado:"Personalizado (N días)"};
  const DIAS_SEMANA = ["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"];

  if(loading) return h('div',{style:{padding:40,textAlign:"center",color:"#94a3b8"}},"Cargando recurrencias...");

  return h('div',{style:{padding:"20px 24px"}},
    // Header
    h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}},
      h('div',null,
        h('div',{style:{fontSize:18,fontWeight:700,color:"#0f172a"}},"Tareas recurrentes"),
        h('div',{style:{fontSize:13,color:"#64748b",marginTop:2}},"Tickets que se generan automáticamente según una frecuencia definida")),
      h('button',{onClick:()=>setModal("nuevo"),
        style:{padding:"10px 20px",background:"#0f172a",color:"white",border:"none",borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:700}},
        "+ Nueva recurrencia")),

    // Lista
    lista.length === 0
      ? h('div',{style:{textAlign:"center",padding:60,color:"#94a3b8",fontSize:14}},"No hay recurrencias configuradas aún.")
      : h('div',{style:{display:"flex",flexDirection:"column",gap:12}},
          ...lista.map(rec => {
            const crit = rec.criticidad||"media";
            const critColor = {urgente:"#ef4444",alta:"#f97316",media:"#eab308",baja:"#22c55e"}[crit]||"#64748b";
            const ticketsGenerados = recs.filter(r=>r.recurrenciaId===rec.id).length;
            return h('div',{key:rec.id,
              style:{background:"white",borderRadius:12,padding:"16px 20px",border:`1.5px solid ${rec.activa?"#e2e8f0":"#f1f5f9"}`,
                borderLeft:`4px solid ${rec.activa?"#8b5cf6":"#cbd5e1"}`,opacity:rec.activa?1:0.6}},
              h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8}},
                h('div',{style:{flex:1}},
                  h('div',{style:{display:"flex",alignItems:"center",gap:8,marginBottom:6}},
                    h('span',{style:{fontWeight:700,fontSize:15,color:"#1e293b"}},rec.nombre),
                    h('span',{style:{padding:"2px 8px",borderRadius:20,fontSize:11,fontWeight:700,color:critColor,background:critColor+"22"}},crit.toUpperCase()),
                    !rec.activa && h('span',{style:{padding:"2px 8px",borderRadius:20,fontSize:11,fontWeight:700,color:"#64748b",background:"#f1f5f9"}},"PAUSADA")),
                  h('div',{style:{fontSize:12,color:"#64748b",display:"flex",gap:16,flexWrap:"wrap"}},
                    h('span',null,(CATS[rec.cat]&&CATS[rec.cat].label)||rec.cat," — ",rec.sector),
                    h('span',{style:{color:"#8b5cf6",fontWeight:600}},
                      rec.patron==="personalizado" ? `Cada ${rec.intervaloDias} días`
                      : rec.patron==="semanal" && rec.diasSemana&&rec.diasSemana.length ? `Semanal: ${(rec.diasSemana||[]).map(d=>DIAS_SEMANA[d]).join(", ")}`
                      : PATRON_LABEL[rec.patron]||rec.patron),
                    h('span',null,"Lead: ",rec.leadTimeDias," día"+(rec.leadTimeDias!==1?"s":"")),
                    rec.ejecutorNombre && h('span',null,"Ejecutor: ",rec.ejecutorNombre),
                    h('span',{style:{color:"#94a3b8"}},ticketsGenerados," ticket"+(ticketsGenerados!==1?"s":"")+" generado"+(ticketsGenerados!==1?"s":"")))),
                h('div',{style:{display:"flex",gap:6}},
                  h('button',{onClick:()=>toggleActiva(rec),
                    style:{padding:"6px 12px",background:rec.activa?"#fff7ed":"#f0fdf4",color:rec.activa?"#c2410c":"#15803d",border:`1.5px solid ${rec.activa?"#fed7aa":"#bbf7d0"}`,borderRadius:7,cursor:"pointer",fontSize:12,fontWeight:600}},
                    rec.activa?"Pausar":"Activar"),
                  h('button',{onClick:()=>setModal(rec),
                    style:{padding:"6px 12px",background:"#f8fafc",color:"#0f172a",border:"1.5px solid #e2e8f0",borderRadius:7,cursor:"pointer",fontSize:12,fontWeight:600}},
                    "Editar"),
                  h('button',{onClick:()=>setConfirmDel(rec),
                    style:{padding:"6px 12px",background:"#fef2f2",color:"#dc2626",border:"1.5px solid #fecaca",borderRadius:7,cursor:"pointer",fontSize:12,fontWeight:600}},
                    "Eliminar"))));
          })),

    // Modal crear/editar
    modal && h(RecurrenciaModal,{
      rec: modal==="nuevo" ? {...RECURRENCIA_EMPTY, id: Date.now()} : modal,
      onSave: guardar,
      onClose: ()=>setModal(null),
      ejecutores, cats
    }),

    // Confirm delete
    confirmDel && h('div',{style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:2000}},
      h('div',{style:{background:"white",borderRadius:16,padding:28,maxWidth:380,width:"100%",margin:"0 16px"}},
        h('div',{style:{fontSize:16,fontWeight:700,color:"#1e293b",marginBottom:8}},"Eliminar recurrencia"),
        h('div',{style:{fontSize:14,color:"#64748b",marginBottom:20}},"Se eliminará \"",confirmDel.nombre,"\". Los tickets ya generados no se borran."),
        h('div',{style:{display:"flex",gap:10}},
          h('button',{onClick:()=>eliminar(confirmDel),style:{flex:1,padding:"10px",background:"#dc2626",color:"white",border:"none",borderRadius:8,cursor:"pointer",fontWeight:700}},"Eliminar"),
          h('button',{onClick:()=>setConfirmDel(null),style:{flex:1,padding:"10px",background:"#f1f5f9",color:"#374151",border:"none",borderRadius:8,cursor:"pointer"}},"Cancelar")))));
}

function ProyectosTab({recs, onUpdate, ejecutores}) {
  const [proyectos,setProyectos] = useState([]);
  const [modal,setModal] = useState(null);
  const [filtroEstado,setFiltroEstado] = useState("");

  useEffect(()=>{
    const saved=ls.get("proyectos");
    if(saved) setProyectos(saved);
  },[]);

  const saveProyecto=async(p)=>{
    const proyectoAnterior = proyectos.find(x=>x.id===p.id);
    const lista=proyectos.find(x=>x.id===p.id)?proyectos.map(x=>x.id===p.id?p:x):[p,...proyectos];
    setProyectos(lista);
    ls.set("proyectos",lista);
    const appUrl=window.location.href.split("?")[0];

    // Detectar si la fecha fin cambió más de 7 días
    const fechaFinAnterior = proyectoAnterior?.fechaFin;
    const fechaFinNueva = p.fechaFin;
    let fechaExtendidaMas7 = false;
    if(fechaFinAnterior && fechaFinNueva && fechaFinNueva !== fechaFinAnterior) {
      const diffDias = (pld(fechaFinNueva) - pld(fechaFinAnterior)) / 86400000;
      if(diffDias > 7) fechaExtendidaMas7 = true;
    }

    // Parsear ejecutores del proyecto (formato "Nombre (mail)")
    const ejsProyecto = (p.empleados||[]).map(e=>{
      const match = e.match(/^(.+)\s+\(([^)]+)\)$/);
      return match ? {nombre:match[1].trim(), mail:match[2].trim()} : {nombre:e, mail:""};
    }).filter(ej=>ej.mail);

    // Update linked reclamos with project data
    for(const num of (p.reclamosVinculados||[])){
      const rec=recs.find(r=>r.numero===num);
      if(!rec) continue;

      const esNuevaVinculacion = rec.proyectoVinculado !== p.id;

      // Autopopular ejecutores desde el proyecto
      let ejecutores_lista = rec.ejecutores_lista || [];
      let ejecutorMail = rec.ejecutorMail || "";
      let ejecutorNombre = rec.ejecutorNombre || "";
      if(ejsProyecto.length > 0) {
        ejecutores_lista = ejsProyecto.map(ej=>({
          ...ej,
          confirmado: false, rechazado: false, fechaConfirmacion: null
        }));
        ejecutorMail = ejsProyecto[0].mail;
        ejecutorNombre = ejsProyecto.map(e=>e.nombre).join(", ");
      }

      const recActualizado = {
        ...rec,
        estadoAvance:"vinculado_proyecto",
        proyectoVinculado:p.id,
        proyectoTitulo:p.titulo,
        fechaInicioEsperado: p.fechaInicio||rec.fechaInicioEsperado,
        fechaCierre: p.fechaFin||rec.fechaCierre,
        fechaCierreConfirmada: p.fechaFin||rec.fechaCierreConfirmada,
        descripcionProyecto: p.descripcion,
        ejecutores_lista,
        ejecutorMail,
        ejecutorNombre,
        comentarios:[...(rec.comentarios||[]),{
          texto:`Vinculado al proyecto "${p.titulo}". Fechas y ejecutores actualizados automáticamente.`,
          fecha:new Date().toISOString(),autor:"Sistema"
        }]
      };
      await onUpdate(recActualizado, rec);

      // Email al solicitante al vincular por primera vez
      if(esNuevaVinculacion && rec.email) {
        await sendEmail({to:rec.email,
          subject:`[Asturiano] Tu solicitud fue vinculada al proyecto "${p.titulo}" — ${rec.numero}`,
          body:`Hola ${rec.nombre},\n\nTu solicitud ${rec.numero} (${rec.sector}) fue vinculada a un proyecto integral del club.\n\n` +
          `📋 PROYECTO: ${p.titulo}\n` +
          (p.descripcion?`📝 Descripción: ${p.descripcion}\n`:"") +
          (p.objetivo?`🎯 Objetivo: ${p.objetivo}\n`:"") +
          (p.fechaInicio?`📅 Inicio previsto: ${new Date(p.fechaInicio).toLocaleDateString("es-AR")}\n`:"") +
          (p.fechaFin?`🏁 Resolución prevista: ${new Date(p.fechaFin).toLocaleDateString("es-AR")}\n`:"") +
          (p.proximosPasos?`\n⏭️ Próximos pasos: ${p.proximosPasos}\n`:"") +
          `\nTu problema será resuelto como parte de este proyecto. Te notificaremos cuando haya avances o cuando se complete.\n\nPodés seguir el estado de tu solicitud:\n${appUrl}?seguimiento=${rec.numero}\n\n— Equipo de Intendencia Asturiano`
        });
      }

      // Email si fecha se extendió más de 7 días
      if(!esNuevaVinculacion && fechaExtendidaMas7 && rec.email) {
        await sendEmail({to:rec.email,
          subject:`[Asturiano] Actualización de fecha — Proyecto "${p.titulo}" — ${rec.numero}`,
          body:`Hola ${rec.nombre},\n\nEl proyecto "${p.titulo}", al que está vinculada tu solicitud ${rec.numero} (${rec.sector}), tiene una nueva fecha estimada de resolución.\n\n` +
          `📅 Fecha anterior: ${pld(fechaFinAnterior).toLocaleDateString("es-AR")}\n` +
          `🏁 Nueva fecha estimada: ${pld(fechaFinNueva).toLocaleDateString("es-AR")}\n\n` +
          `Lamentamos el inconveniente. Te avisaremos cuando el proyecto sea completado.\n\nSeguí el estado de tu solicitud:\n${appUrl}?seguimiento=${rec.numero}\n\n— Equipo de Intendencia Asturiano`
        });
      }
    }
  };

  const ESTADOS_PROJ=[
    {id:"planificacion",label:"Planificación",color:"#0ea5e9"},
    {id:"en_curso",label:"En curso",color:"#3b82f6"},
    {id:"pausado",label:"Pausado",color:"#f97316"},
    {id:"completado",label:"Completado",color:"#22c55e"},
    {id:"cancelado",label:"Cancelado",color:"#ef4444"},
  ];

  const filtrados=proyectos.filter(p=>!filtroEstado||p.estado===filtroEstado);

  return h('div',{style:{padding:"16px 24px 40px"}},
    h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}},
      h('div',{style:{display:"flex",gap:8}},
        h('select',{value:filtroEstado,onChange:e=>setFiltroEstado(e.target.value),style:{padding:"7px 12px",borderRadius:8,border:"1.5px solid #e2e8f0",fontSize:13,outline:"none"}},
          h('option',{value:""},"Todos los estados"),
          ...ESTADOS_PROJ.map(e=>h('option',{key:e.id,value:e.id},e.label))),
        h('span',{style:{alignSelf:"center",fontSize:13,color:"#94a3b8"}},filtrados.length+" proyectos")),
      h('button',{onClick:()=>setModal({}),style:{padding:"9px 18px",background:"linear-gradient(135deg,#7c3aed,#5b21b6)",color:"white",border:"none",borderRadius:10,cursor:"pointer",fontSize:13,fontWeight:700}},"+ Nuevo proyecto")),
    filtrados.length===0 && h('div',{style:{textAlign:"center",padding:"60px 0",color:"#94a3b8"}},
      h('div',{style:{fontSize:40,marginBottom:12}},"📋"),
      h('div',{style:{fontSize:16,fontWeight:600,marginBottom:8}},"No hay proyectos"),
      h('div',{style:{fontSize:14}},"Creá el primero con el botón de arriba.")),
    h('div',{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(320px,1fr))",gap:14}},
      ...filtrados.map(p=>{
        const est=ESTADOS_PROJ.find(e=>e.id===p.estado);
        const diasRestantes=p.fechaFin?(new Date(p.fechaFin)-new Date())/86400000:null;
        const vencido=diasRestantes!==null&&diasRestantes<0&&p.estado!=="completado";
        return h('div',{key:p.id,style:{background:"white",borderRadius:14,padding:"18px 20px",boxShadow:"0 2px 8px rgba(0,0,0,0.07)",borderTop:`4px solid ${est?.color||"#e2e8f0"}`,cursor:"pointer"},onClick:()=>{
          // Reload from localStorage to get latest reclamosVinculados
          const fresh = (ls.get("proyectos")||[]).find(x=>x.id===p.id) || p;
          setModal(fresh);
        }},
          h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}},
            h('div',{style:{fontSize:15,fontWeight:700,color:"#0f172a",lineHeight:1.3,flex:1}},p.titulo||"Sin título"),
            h('span',{style:{padding:"2px 8px",borderRadius:20,fontSize:11,fontWeight:600,color:est?.color,background:est?.color+"22",whiteSpace:"nowrap",marginLeft:8}},est?.label)),
          p.sector && h('div',{style:{fontSize:12,color:"#64748b",marginBottom:6}},"📍 "+p.sector),
          p.descripcion && h('div',{style:{fontSize:13,color:"#475569",lineHeight:1.5,marginBottom:10,overflow:"hidden",textOverflow:"ellipsis",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}},p.descripcion),
          h('div',{style:{display:"flex",gap:12,marginBottom:8,fontSize:12,color:"#64748b"}},
            p.fechaInicio && h('span',null,"🗓 Inicio: "+fd(p.fechaInicio)),
            p.fechaFin && h('span',{style:{color:vencido?"#ef4444":"inherit",fontWeight:vencido?700:400}},vencido?"⚠️ Vencido: "+fd(p.fechaFin):"🏁 Fin: "+fd(p.fechaFin))),
          h('div',{style:{display:"flex",gap:8,fontSize:12}},
            p.reclamosVinculados?.length>0 && h('span',{style:{background:"#f3f4f6",borderRadius:6,padding:"2px 8px",color:"#374151"}},"🔗 "+p.reclamosVinculados.length+" reclamos"),
            p.presupuesto && h('span',{style:{background:"#f3f4f6",borderRadius:6,padding:"2px 8px",color:"#374151"}},"💰 $"+Number(p.presupuesto).toLocaleString("es-AR")),
            p.alertas?.length>0 && h('span',{style:{background:"#fff7ed",borderRadius:6,padding:"2px 8px",color:"#c2410c",fontWeight:600}},"⚠️ "+p.alertas.length+" alertas")));
      })),
    modal!==null && h(ModalProyecto,{proyecto:modal.id?modal:null,onClose:()=>setModal(null),onSave:saveProyecto,ejecutores,recs}));
}

function PanelAdmin({recs, onUpdate, onRefresh, area}) {
  // Auto-refresh every 30 seconds
  useEffect(()=>{
    const interval = setInterval(()=>{ if(onRefresh) onRefresh(); }, 30000);
    return ()=>clearInterval(interval);
  },[]);
  // Ejecutores propios del área
  const ejsKey = "ejecutores_"+(area||"intendencia");
  const getEjsFallback = () => {
    const cfg = area==="administracion" ? (_cfgCacheAdm||ls.get("config_administracion")||{}) : (_cfgCache||ls.get("config_intendencia")||{});
    return cfg.ejecutores||[];
  };
  const [ejecutores, setEjecutores] = useState(()=>{
    const fromLs = ls.get(ejsKey)||ls.get("ejecutores");
    return (fromLs&&fromLs.length) ? fromLs : getEjsFallback();
  });
  useEffect(()=>{
    const fromLs = ls.get(ejsKey)||ls.get("ejecutores");
    if(fromLs&&fromLs.length) { setEjecutores(fromLs); return; }
    const fromCfg = getEjsFallback();
    if(fromCfg.length) setEjecutores(fromCfg);
  },[area]);
  // Re-check ejecutores después de que loadConfig() termine (async)
  useEffect(()=>{
    const timer = setTimeout(()=>{
      if(ejecutores.length) return;
      const fromLs = ls.get(ejsKey)||ls.get("ejecutores");
      if(fromLs&&fromLs.length) { setEjecutores(fromLs); return; }
      const fromCfg = getEjsFallback();
      if(fromCfg.length) setEjecutores(fromCfg);
    }, 1500);
    return ()=>clearTimeout(timer);
  },[]);
  const [filtros,setFiltros] = useState({estado:"",cat:"",sector:"",q:""});
  const [modal,setModal] = useState(null);
  const [modalDup,setModalDup] = useState(null); // {hijo, padre}
  const [view,setView] = useState("lista");
  const [mainTab,setMainTab] = useState("reclamos");
  const [showCfg,setShowCfg] = useState(false);
  const [checking,setChecking] = useState(false);
  const sf = (k,v) => setFiltros(f=>({...f,[k]:v}));

  const filtrados = recs.filter(r=>{
    // Ocultar consolidadas (sub-tickets) del panel principal
    if(r.estadoAvance==="consolidada" && !filtros.estado) return false;
    if(filtros.estado&&r.estadoAvance!==filtros.estado) return false;
    if(filtros.cat&&r.cat!==filtros.cat) return false;
    if(filtros.sector&&r.sector!==filtros.sector) return false;
    if(filtros.responsable){
      const catCfg = getCatCfg(r.cat);
      const tieneResp = (catCfg.responsables||[]).some(rp=>rp.mail===filtros.responsable);
      if(!tieneResp) return false;
    }
    if(filtros.q){const q=filtros.q.toLowerCase();if(!r.numero.toLowerCase().includes(q)&&!r.desc?.toLowerCase().includes(q)&&!r.sector.toLowerCase().includes(q))return false;}
    return true;
  }).sort((a,b)=>{
    const s=filtros.sort||"sector";
    if(s==="sector") return (a.sector||"").localeCompare(b.sector||"")||new Date(a.createdAt)-new Date(b.createdAt);
    if(s==="numero") return (a.numero||"").localeCompare(b.numero||"");
    if(s==="fecha") return new Date(b.createdAt)-new Date(a.createdAt);
    if(s==="criticidad"){const ord=["urgente","alta","media","baja"];return ord.indexOf(a.criticidad||a.pri)-ord.indexOf(b.criticidad||b.pri);}
    return 0;
  });

  const stats={
    total:recs.length,
    noIniciadas:recs.filter(r=>r.estadoAvance==="bajo_analisis").length,
    enCurso:recs.filter(r=>r.estadoAvance==="iniciada").length,
    demoradas:recs.filter(r=>r.estadoAvance==="demorada"||(!["completada","consolidada","sin_resolucion","vinculado_proyecto"].includes(r.estadoAvance)&&r.fechaCierre&&pld(r.fechaCierre)<new Date())).length,
    completadas:recs.filter(r=>r.estadoAvance==="completada").length,
  };

  const testAlerts = async (diasSimulados) => {
    await checkAlerts(diasSimulados);
  };

  const checkAlerts = async (diasOverride) => {
    setChecking(true);
    const ahora = new Date();
    const appUrl = window.location.href.split("?")[0];
    let enviados = 0;
    let actualizados = [...recs];

    const diasDesdeRec = (isoDate) => {
      if(diasOverride != null) return diasOverride;
      return (ahora - new Date(isoDate)) / 86400000;
    };

    for (const r of recs) {
      if(["completada","consolidada","vinculado_proyecto"].includes(r.estadoAvance)) continue;

      const crit = r.criticidad || r.pri || "media";
      const plazos = ESCALADO[crit] || ESCALADO.media;
      const catCfg = getCatCfg(r.cat);
      const respMails = (catCfg.responsables||[]).map(x=>x.mail).filter(Boolean);
      const dirMails  = (catCfg.directivos||[]).map(x=>x.mail).filter(Boolean);
      const diasCreado = diasDesdeRec(r.createdAt);

      // CASO 1: Sin ejecutor o sin fechas
      if (!r.ejecutorMail || !r.fechaInicioOriginal) {
        if (diasCreado >= plazos.directivo) {
          const dest=[...dirMails,...respMails].filter(Boolean);
          if(dest.length){ await sendEmail({to:dest, subject:`[Asturiano]  Solicitud sin asignar — ${r.numero}`, body:`La solicitud ${r.numero} lleva ${formatTiempoJS(diasCreado)} sin ejecutor ni fechas.\n\nSector: ${r.sector}\nDescripción: ${r.desc}\nCriticidad: ${crit}\n\n${appUrl}`}); enviados++; }
        } else if (diasCreado >= plazos.recordatorio) {
          if(respMails.length){ await sendEmail({to:respMails, subject:`[Asturiano]  Solicitud pendiente de asignación — ${r.numero}`, body:`La solicitud ${r.numero} no tiene ejecutor ni fechas asignadas.\n\nSector: ${r.sector}\nDescripción: ${r.desc}\n\nIngresá al panel:\n${appUrl}`}); enviados++; }
        }
        continue;
      }

      // CASO 2: Ejecutor asignado pero no confirmó
      if (r.ejecutorMail && !r.ejecutorConfirmado && !r.ejecutorRechazado) {
        const diasAsig = r.fechaAsignacion ? diasDesdeRec(r.fechaAsignacion) : diasCreado;
        if (diasAsig >= plazos.directivo) {
          const dest=[...dirMails,...respMails].filter(Boolean);
          if(dest.length){ await sendEmail({to:dest, subject:`[Asturiano]  Ejecutor no confirmó — ${r.numero}`, body:`El ejecutor ${r.ejecutorNombre} no confirmó la tarea ${r.numero} hace ${formatTiempoJS(diasAsig)}.\n\nSector: ${r.sector}\n\nSe requiere reasignación.\n\n${appUrl}`}); enviados++; }
        } else if (diasAsig >= plazos.recordatorio) {
          const dest=[r.ejecutorMail,...respMails].filter(Boolean);
          if(dest.length){ await sendEmail({to:dest, subject:`[Asturiano]  Confirmación pendiente — ${r.numero}`, body:`Recordatorio: ${r.ejecutorNombre}, por favor confirmá o rechazá la tarea ${r.numero}.\n\nConfirmar: ${appUrl}?confirmar=${r.id}\nRechazar: ${appUrl}?rechazar=${r.id}`}); enviados++; }
        }
      }

      // CASO 3: Fecha de cierre excedida → marcar demorada
      const fechaCierre = r.fechaCierreActualizada || r.fechaCierre;
      if (fechaCierre && !diasOverride && pld(fechaCierre)<ahora && r.estadoAvance!=="demorada") {
        const updated={...r,estadoAvance:"demorada",comentarios:[...(r.comentarios||[]),{texto:"Marcada automáticamente como demorada.",fecha:ahora.toISOString(),autor:"Sistema"}]};
        await sbUpsert(updated);
        actualizados=actualizados.map(x=>x.id===r.id?updated:x);
        const dest=[...dirMails,...respMails].filter(Boolean);
        if(dest.length){ await sendEmail({to:dest, subject:`[Asturiano]  Tarea demorada — ${r.numero}`, body:`La tarea ${r.numero} excedió su fecha de cierre.\n\nSector: ${r.sector}\nEjecutor: ${r.ejecutorNombre||"—"}\nFecha cierre: ${fd(fechaCierre)}\n\n${appUrl}`}); enviados++; }
      }

      // CASO 4: Recordatorio al ejecutor cuando llega fecha inicio

      h('div',{style:{fontSize:11,letterSpacing:3,color:"#93c5fd",textTransform:"uppercase",marginBottom:8}},"Resolución de Solicitud"),
      h('h1',{style:{fontFamily:"'Playfair Display',serif",fontSize:26,color:"white",fontWeight:900}},rec.numero),
      h('div',{style:{width:40,height:3,background:"#22c55e",margin:"10px auto 0",borderRadius:2}})),
    h('div',{style:{maxWidth:480,margin:"0 auto"}},
      h('div',{style:{background:"white",borderRadius:16,padding:"24px 20px"}},
        // Mensaje cálido principal
        h('div',{style:{textAlign:"center",marginBottom:20,paddingBottom:18,borderBottom:"1.5px solid #f1f5f9"}},
          h('div',{style:{fontSize:40,marginBottom:10}},"✅"),
          h('div',{style:{fontSize:16,fontWeight:700,color:"#0f172a",marginBottom:6}},"¡Hola "+rec.nombre.split(" ")[0]+"!"),
          h('div',{style:{fontSize:14,color:"#475569",lineHeight:1.7}},"Nos alegra informarte que "+msgCat+" en "+rec.sector+".")),
        // Detalle sector/tipo
        h('div',{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16,background:"#f8fafc",borderRadius:10,padding:12}},
          h('div',null,h('div',{style:{fontSize:10,color:"#94a3b8",fontWeight:600,marginBottom:2}},"SECTOR"),h('div',{style:{fontSize:13,fontWeight:600}},rec.sector)),
          h('div',null,h('div',{style:{fontSize:10,color:"#94a3b8",fontWeight:600,marginBottom:2}},"TIPO"),h('div',{style:{fontSize:13}},cat?.icon+" "+cat?.label)),
          h('div',null,h('div',{style:{fontSize:10,color:"#94a3b8",fontWeight:600,marginBottom:2}},"RECLAMO"),h('div',{style:{fontSize:13,fontFamily:"monospace",fontWeight:700,color:"#3b82f6"}},rec.numero)),
          h('div',null,h('div',{style:{fontSize:10,color:"#94a3b8",fontWeight:600,marginBottom:2}},"RESUELTO"),h('div',{style:{fontSize:13}},fd(rec.updatedAt||rec.createdAt)))),
        // Lo que se hizo
        h('div',{style:{background:"#f0fdf4",border:"1.5px solid #bbf7d0",borderRadius:10,padding:"12px 14px",marginBottom:fotos.length?12:16}},
          h('div',{style:{fontSize:11,color:"#15803d",fontWeight:700,marginBottom:6,textTransform:"uppercase",letterSpacing:0.5}},"Lo que se hizo"),
          h('div',{style:{fontSize:13,color:"#166534",lineHeight:1.7}},
            rec.descripcionResolucion?.trim()
              ? rec.descripcionResolucion
              : "El equipo verificó y resolvió el problema in situ. Si tenés alguna duda, podés calificarnos a continuación.")),
        // Fotos si hay
        fotos.length > 0 && h('div',{style:{marginBottom:16}},

                : h('a',{key:i,href:a.url,target:"_blank"},
                    h('img',{src:a.url,alt:"Evidencia",style:{width:90,height:90,objectFit:"cover",borderRadius:8,border:"1.5px solid #e2e8f0"}}))))),
        // Calificación
        h('div',{style:{textAlign:"center",marginBottom:stars>0&&stars<=3?0:16}},
          h('div',{style:{fontSize:14,fontWeight:600,color:"#374151",marginBottom:4}},"Cuando tengas un momento, evaluá si el problema quedó resuelto y calificá la atención."),

              style:{fontSize:34,background:"none",border:"none",cursor:"pointer",opacity:s<=stars?1:0.25,transform:s<=stars?"scale(1.15)":"scale(1)",transition:"all 0.15s"}},"⭐")))),
        stars > 0 && stars <= 3 && h('div',{style:{marginBottom:14,marginTop:14}},
          h('label',{style:{display:"block",fontSize:12,fontWeight:600,color:"#374151",marginBottom:6,textTransform:"uppercase",letterSpacing:0.5}},"Contanos qué salió mal *"),
          h('textarea',{value:motivo,onChange:e=>setMotivo(e.target.value),rows:4,placeholder:"Describí por qué no quedaste conforme con la resolución...",style:{width:"100%",padding:"10px 14px",borderRadius:8,border:"1.5px solid #e2e8f0",fontSize:14,resize:"vertical",outline:"none",boxSizing:"border-box"}})),
        stars > 0 && h('button',{onClick:submitCalif,disabled:sending||(stars<=3&&!motivo.trim()),
          style:{width:"100%",padding:"14px",marginTop:12,background:(sending||(stars<=3&&!motivo.trim()))?"#94a3b8":stars>=4?"linear-gradient(135deg,#22c55e,#15803d)":"linear-gradient(135deg,#ef4444,#dc2626)",color:"white",border:"none",borderRadius:12,fontSize:15,fontWeight:700,cursor:"pointer"}},
          sending?"Enviando...":stars>=4?"✅ Confirmar que quedó resuelto":"📨 Solicitar reapertura"),
        // Separador y opción de reabrir siempre visible al pie
        h('div',{style:{marginTop:20,paddingTop:16,borderTop:"1px solid #f1f5f9",textAlign:"center"}},
